apiVersion: v2
name: perf-sentinel
description: |
  Lightweight polyglot performance anti-pattern detector for distributed
  traces. Detects N+1 queries, redundant calls, chatty services, connection
  pool saturation, serialized parallelizable calls, fanout. Scores I/O
  intensity per endpoint (GreenOps).
type: application
version: 0.9.9
appVersion: "0.9.9"
kubeVersion: ">=1.24.0-0"
home: https://github.com/robintra/perf-sentinel
icon: https://raw.githubusercontent.com/robintra/perf-sentinel/main/logo/logo-horizontal.svg
sources:
  - https://github.com/robintra/perf-sentinel
keywords:
  - performance
  - n-plus-one
  - observability
  - opentelemetry
  - greenops
maintainers:
  - name: robintra
    url: https://github.com/robintra
annotations:
  category: Observability
  licenses: AGPL-3.0-only

  artifacthub.io/category: monitoring-logging
  artifacthub.io/license: AGPL-3.0-only
  artifacthub.io/official: "true"
