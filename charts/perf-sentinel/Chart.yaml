apiVersion: v2
name: perf-sentinel
description: |
  Lightweight polyglot performance anti-pattern detector for distributed
  traces. Detects N+1 queries, redundant calls, chatty services, connection
  pool saturation, serialized parallelizable calls, fanout. Scores I/O
  intensity per endpoint (GreenOps).
type: application
version: 0.2.33
appVersion: "0.6.1"
kubeVersion: ">=1.24.0-0"
home: https://github.com/robintra/perf-sentinel
icon: https://raw.githubusercontent.com/robintra/perf-sentinel/main/logo/logo-horizontal.svg
sources:
  - https://github.com/robintra/perf-sentinel
keywords:
  - performance
  - n-plus-one
  - observability
  - opentelemetry
  - greenops
maintainers:
  - name: robintra
    url: https://github.com/robintra
annotations:
  category: Observability
  licenses: AGPL-3.0-only

  artifacthub.io/category: monitoring-logging
  artifacthub.io/license: AGPL-3.0-only
  artifacthub.io/official: "true"
  artifacthub.io/links: |
    - name: Source
      url: https://github.com/robintra/perf-sentinel
    - name: Documentation
      url: https://github.com/robintra/perf-sentinel/tree/main/docs
    - name: Helm deployment guide
      url: https://github.com/robintra/perf-sentinel/blob/main/docs/HELM-DEPLOYMENT.md
  artifacthub.io/changes: |
    - kind: security
      description: "appVersion 0.6.1: reject CORS wildcard combined with [daemon.ack] api_key at config load (closes the cross-origin X-API-Key replay vector), refuse following symlinks on TOML acknowledgments load, strip BiDi/invisible characters from SARIF result message and logical locations, cap OTLP gRPC HTTP/2 concurrent streams at 256 per connection."
    - kind: changed
      description: "Hot-path tightening across detect, normalize and score (chatty single-pass, serialized unstable sort, pre-sized HTTP params vec, right-sized avoidable-finding dedup). Centralized timestamp parsing on the shared time module. Lowercased default_region at config load."
  artifacthub.io/images: |
    - name: perf-sentinel
      image: ghcr.io/robintra/perf-sentinel:0.6.1
      platforms:
        - linux/amd64
        - linux/arm64

