    - name: Helm deployment guide
      url: https://github.com/robintra/perf-sentinel/blob/main/docs/HELM-DEPLOYMENT.md
  artifacthub.io/changes: |
    - kind: fixed
      description: "appVersion 0.9.9: slow_sql now fires for services instrumented by the PHP OTel contrib packages (Symfony + Doctrine + PDO). Those packages split each query across a statement-bearing SELECT orders span (db.query.text, ~0 ms) and its statement-less Doctrine::execute sibling carrying the real duration, with db.system.name only on the pdo child, so OTLP conversion previously dropped every duration-bearing span as missing_db_statement and such services never produced a slow SQL event. A stitch pass at OTLP conversion re-joins each query into one event carrying the statement and the real duration; merged spans count under the new merged_db_span reason of perf_sentinel_otlp_spans_filtered_total. Single-layer emitters (Laravel, Django, Rails) are unchanged. No chart template change, this bump tracks the new appVersion."
    - kind: changed
      description: "appVersion 0.9.8 (breaking, HTTP acknowledgment signatures reset): the HTTP normalizer now keeps the callee host in the grouping template for DNS-addressed calls (GET user-svc/api/users/{id} instead of GET /api/users/{id}), so two calls to the same path on different backend services no longer collapse into a false redundant_http. IP-literal authorities (IPv4 and bracketed IPv6) are still stripped so load-balanced pod replicas keep deduping, the port and RFC 3986 userinfo are dropped, a trailing DNS root dot is canonicalized, and the host is lowercased. Because the finding signature hashes pattern.template, every outbound-HTTP finding's signature changes, so existing HTTP acknowledgments must be re-created (SQL and RPC findings are unaffected). No chart template change, this bump tracks the new appVersion."
    - kind: added
      description: "appVersion 0.9.8: OTLP ingest now admits RPC spans (OTel RPC semconv rpc.system/rpc.service/rpc.method, the standard gRPC and RPC-framework shape). These carried neither db.statement/db.query.text nor http.url/url.full, so the I/O filter dropped every one as non-I/O and the topological detectors (excessive_fanout, chatty_service, serialized_calls) plus the occurrence detectors were blind on gRPC-heavy fleets. RPC spans are keyed on rpc.system and modeled as outbound calls (target rpc.service/rpc.method, span-name fallback), admitting only SpanKind::Client so the inbound SERVER handler span is not double-counted. Admission-only reuse of the HTTP normalize path, so findings surface under the _http types and n_plus_one_sql never applies. No chart template change, this bump tracks the new appVersion."
    - kind: fixed
      description: "appVersion 0.9.7: batch analyze --input now accepts OTLP/JSON list attributes serialized the canonical protobuf JSON way, with the empty repeated field omitted (arrayValue:{} or kvlistValue:{}). Previously one such attribute failed the whole file with a missing values field and a non-zero exit, so nothing was analyzed. The OTLP/JSON reader keeps the strict typed parse as the fast path and backfills the omitted empty list only for the affected document. No chart template change, this bump tracks the new appVersion."
    - kind: changed
      description: "appVersion 0.9.6: the embedded carbon-intensity table switches its nationally-gridded rows from Electricity Maps consumption-based 2023-2024 means to Ember yearly generation-based national data (latest year per country), regenerated semiannually by the new refresh-datasets workflow through a reviewed PR. Low-carbon grids move the most (Sweden 8 to 35.4, Finland 8 to 57.5, Norway 7 to 28.1 gCO2eq/kWh), the generation-vs-consumption accounting difference documented in docs/METHODOLOGY.md. Hourly profiles are renormalized to the new annual levels, shapes unchanged. The SPECpower instance table is now generated from the CCF coefficient CSVs (the m6a/c6a families align to the CCF EPYC 3rd Gen coefficient, 26 rows lose hand-rounding slips of at most 0.1 W). Carbon outputs shift for the affected regions. SPECPOWER_VINTAGE is unchanged, so operator TOMLs pinning specpower_table_version are unaffected. No chart template change, this bump tracks the new appVersion."
    - kind: added
      description: "appVersion 0.9.5: the binary adds OTLP JSON auto-detection to batch analyze --input (single object or Collector file exporter NDJSON, reusing the daemon conversion path) and a new mysql-stat subcommand ranking MySQL hotspots from performance_schema.events_statements_summary_by_digest exports, with a matching mysql_stat tab in the self-contained HTML dashboard via report --mysql-stat. An opt-in daemon memory-pressure guard ([daemon] memory_high_water_pct, default off) rejects OTLP ingest when cgroup v2 memory crosses the configured high-water mark, bounding RSS against OOM. Toolchain moves to Rust 1.96.1."
    - kind: added
      description: "Chart alerting: new PerfSentinelMemoryPressureRejecting PrometheusRule, and PerfSentinelIngestRejecting is now scoped to reason=channel_full, so a memory-guard rejection points operators at resources.limits.memory rather than the ingest queue."
    - kind: added
      description: "appVersion 0.9.4: the daemon binary adds PHP framework-aware suggested_fix. Findings on Laravel/Eloquent and Symfony/Doctrine stacks (detected via the native io.opentelemetry.contrib.php.* instrumentation scopes or a .php source path) carry framework-specific remediation, with a PHP generic fallback across all ten anti-patterns. The sanitizer-aware N+1 classifier now treats the Laravel and Doctrine scopes as ORM markers, so an obfuscated Eloquent/Doctrine N+1 classifies as n_plus_one_sql under the default auto mode. dd-trace-php bridged through the Collector datadogreceiver carries no framework signal. No chart template change."
    - kind: added
      description: "appVersion 0.9.3: the daemon binary adds a Datadog / dd-trace ingestion path. Teams with no OpenTelemetry SDK can bridge dd-trace through an OTel Collector running the datadogreceiver, and perf-sentinel reads the SQL from dd.span.Resource natively. It also recognizes the stable OTel 1.27+ db.system.name attribute across the OTLP, Jaeger and Zipkin ingest paths, with consistent engine-label canonicalization. No chart template change."
    - kind: changed
      description: "appVersion 0.9.2: the daemon binary adds Ruby/Active Record framework-aware suggestions (detected via the OpenTelemetry::Instrumentation::ActiveRecord scope or a .rb source path), drops non-SQL datastore spans (Redis, MongoDB and similar) at ingestion under a dedicated non_sql_datastore OTLP filter reason kept out of the zero-retention warning, tokenizes MySQL backtick identifiers, and stops embedding the raw db.statement in the self-contained HTML report (closing a SQL-literal leak). No chart template change."
    - kind: security
      description: "appVersion 0.9.1: the daemon binary updates opentelemetry_sdk to 0.32.1, resolving CVE-2026-48504 (unbounded memory allocation in W3C Baggage propagation). No chart template change."
    - kind: changed
      description: "appVersion 0.9.0: the self-contained HTML dashboard is rebuilt as an application shell (sidebar navigation, Overview landing page, Findings master/detail with the Explain trace tree inline, severity-tinted KPI cards, syntax highlighting, embedded Geist fonts). The chart version is realigned to track appVersion (both 0.9.0), replacing the independent 0.2.x line. No chart template change."
    - kind: changed
      description: "appVersion 0.8.14: the HTML dashboard dark theme darkens its secondary panel background from #2c2c2c to #212121, giving metric cards, rows and the topbar more contrast against the primary background. Cosmetic, dark theme only. No chart template change, this bump only tracks the new appVersion."
    - kind: added
      description: "appVersion 0.7.4: two opt-in measured-energy sources extend the carbon attribution stack on ARM64 and bare-metal hosts. Kepler (kepler_ebpf) reads eBPF per-container or per-process joule counters. Redfish BMC (redfish_bmc) reads chassis wall-plug watts via the baseboard management controller and attributes them per service proportionally to ops-deltas. The carbon precedence chain becomes electricity_maps_api > scaphandre_rapl > kepler_ebpf > redfish_bmc > cloud_specpower > io_proxy_v3 > io_proxy_v2 > io_proxy_v1. Two new Prometheus gauges are exposed: perf_sentinel_kepler_last_scrape_age_seconds and perf_sentinel_redfish_last_scrape_age_seconds."
    - kind: fixed
      description: "appVersion 0.7.5: align the Kepler scraper to the Kepler v2 upstream metric names (Kepler >= 0.10). The container variant now reads kepler_container_cpu_joules_total (was kepler_container_joules_total). The previous process_package and process_dram metric_kind values targeted metrics that Kepler never published and are removed: use metric_kind = 'process' which reads kepler_process_cpu_joules_total keyed by the comm label. Operators with these legacy values in their .perf-sentinel.toml get a config-load error pointing at the replacement, no silent fallback. The Process variant also caps service_mappings label values at 15 chars to match the kernel's TASK_COMM_LEN truncation. The scraper warns once when an apparently healthy endpoint returns zero matching samples for three consecutive ticks, catching the legacy-Kepler upgrade pitfall. Redfish BMC integration unchanged."
    - kind: changed
      description: "appVersion 0.7.6: two config breaking changes on Scaphandre and Redfish to eliminate silent over-attribution. Scaphandre `process_map` becomes a typed table per service with `exe_contains` plus optional `cmdline_contains` substrings, replacing the previous flat `\"service\" = \"exe\"` form. Substring matching on both labels disambiguates co-located JVMs or .NET assemblies sharing a runtime. Redfish `endpoints` becomes a typed table per chassis with `url` plus `schema` enum (`legacy_power` or `environment_metrics`), the top-level `power_path` field is removed. EnvironmentMetrics (`PowerWatts.Reading`) is now natively supported alongside the legacy `/Power` resource. Both new struct shapes deny unknown TOML fields. Scaphandre adds a zero-sample warn-once net that catches silent upstream renames of the metric or the `exe` label at runtime, mirroring the Kepler net from 0.7.5, and the staleness gauge now climbs from boot on failure parity with Kepler. Wire-conformance CI extended to assert both Scaphandre cmdline disambiguation and Redfish dual-schema parsing against the real upstream binaries."
    - kind: fixed
      description: "appVersion 0.7.7: closes an N+1 SQL detection gap on non-Java stacks. The sanitizer-aware classifier and the SQL normalizer assumed JDBC-style ? placeholders, so Go (pgx $1), Python (psycopg %s, SQLAlchemy :name), .NET (@param) and any stack sending pre-parameterized SQL to the wire was classified as redundant_sql instead of n_plus_one_sql. Sequentiality is now evaluated in microseconds, so sub-millisecond n+1 and serialized-calls patterns no longer slip the gate, strict sanitizer-aware mode reaches parity with auto on bare-driver stacks, and suggested_fix coverage broadens from 3 to 10 anti-patterns across 6 language ecosystems (96 entries, Python, Go and Node.js/TypeScript join Java, C#, Rust). Operators with strict quality_gate rules should re-baseline n_plus_one_sql_critical_max, serialized_calls_critical_max and pool_saturation_critical_max, previously redundant_sql warnings may resurface as n_plus_one_sql criticals (same defects, sharper label)."
    - kind: added
      description: "appVersion 0.7.8: closes the suggested_fix coverage gaps from the v0.7.7 lab and extends N+1 detection to HTTP. Vendor-specific OTel scope recognition resolves a framework for scopes outside the io.opentelemetry.* convention (.NET EF Core via OpenTelemetry.Instrumentation.EntityFrameworkCore or Microsoft.EntityFrameworkCore, Quarkus via io.quarkus.*). A last-resort service-name fallback infers the framework from a distinctive substring in the service name when scopes and code_location are absent. HTTP N+1 sanitizer-aware classification reclassifies same-URL high-occurrence HTTP groups with timing variance from redundant_http to n_plus_one_http. No config, CLI, daemon wire, or report JSON change. Known limitation documented: OpenTelemetry .NET redacts the query string to ?* by default, so query-parameter HTTP N+1 loops stay redundant_http unless OTEL_DOTNET_EXPERIMENTAL_HTTPCLIENT_DISABLE_URL_QUERY_REDACTION=true is set."
    - kind: added
      description: "appVersion 0.8.0: the inspect TUI becomes a unified multi-view interface. Two views join the existing Inspect browser, Analyze (GreenOps summary with I/O waste ratio, top offenders, quality gate, findings by severity) and Explain (the selected trace's annotated span tree, full screen). Enter descends Analyze -> Inspect -> Explain and Esc ascends back. analyze --tui and explain --tui open the TUI directly, their default stdout output is unchanged because --tui conflicts with --format and --ci. Under query inspect the Analyze view is fed live from /api/export/report, degrading to a hint on older daemons. No chart template change, this bump only tracks the new appVersion."
    - kind: changed
      description: "appVersion 0.8.1: patch release with no daemon-facing change. The SQL tokenizer slice path gains a debug-only char-boundary assertion (compiled out in release) as a refactor guard, disclose state initialization is simplified, and the release profile rationale now documents why overflow-checks stays off in release. Remaining changes are release tooling (Helm chart release automation script) and documentation. No chart template change, this bump only tracks the new appVersion."
    - kind: added
      description: "appVersion 0.8.2: the periodic public disclosure reports avoidable energy and carbon at two N+1 thresholds side by side, canonical_waste (a threshold pinned in the binary that the operator cannot configure, so the disclosed waste figure is non-manipulable) and operational_waste (the operator's configured threshold), schema perf-sentinel-report/v1.1. The flat avoidable fields alias the canonical tier and the change is additive, v1.0 readers remain valid. Also bumps the TUI backend to ratatui 0.30.1. No chart template change, this bump only tracks the new appVersion."
    - kind: added
      description: "appVersion 0.8.3: the periodic public disclosure gains a temporal-coverage continuity signal (aggregate.temporal_coverage, schema perf-sentinel-report/v1.2) that reports how many of the declared period's calendar days carried measurements, so a reader can tell a continuously-measured period from one where the daemon ran only a few days. Archiving is traffic-gated so the figure is a lower bound on activity, not daemon uptime, surfaced as a warning and an in-band disclaimer, never a hard official gate. Also adds an in-band coverage_basis provenance marker and reserves an integrity.cross_period_log hook. The schema change is additive, v1.1 and v1.0 readers remain valid. No chart template change, this bump only tracks the new appVersion."
    - kind: added
      description: "appVersion 0.8.4: a man subcommand renders the perf-sentinel manual page to stdout (perf-sentinel man, backed by clap_mangen), mirroring the existing completions subcommand. Every user-facing command's --help now carries copy-pasteable usage examples, and several command help texts were tightened. No chart template change, this bump only tracks the new appVersion."
    - kind: changed
      description: "appVersion 0.8.5: a normal Kubernetes pod termination (SIGTERM from a rolling update or scale-down) now drains the daemon's in-flight streaming window through detection instead of dropping it, matching the existing SIGINT (Ctrl+C) behavior, via a shared shutdown-signal helper that also aborts in-flight Tempo fetches. Only an ungraceful kill (SIGKILL after the grace period, OOM) still loses the window, so set terminationGracePeriodSeconds above the daemon's window duration to benefit. The Windows daemon binary and core test suite also build and run now. No chart template change, this bump only tracks the new appVersion."
    - kind: changed
      description: "appVersion 0.8.6: the daemon's ingestion channel and analysis-worker queue depths are now configurable via [daemon] ingest_queue_capacity and analysis_queue_capacity (both default 1024), and the base CarbonContext is shared across analysis batches by Arc instead of being deep-cloned on every evicted batch. No chart template change, this bump only tracks the new appVersion."
    - kind: changed
      description: "appVersion 0.8.7: four new daemon loss-observability counters (perf_sentinel_otlp_spans_received_total, perf_sentinel_otlp_spans_filtered_total by reason, perf_sentinel_service_io_ops_overflow_total, perf_sentinel_correlator_pairs_evicted_total) make previously silent drop paths visible; a primary-source audit refreshes the embedded carbon data (Paris regions 56 to 41 gCO2eq/kWh, Sao Paulo 62 to 96, Belgium 187 to 165, the eu-central-1 hourly profile rescaled from its stale 2022 level to the Electricity Maps 2024 level, generic PUE 1.2 to 1.5); and the limit-testing campaign hardens wide-topology and saturation behavior (correlator pair admission control fixes a 1500-service OOM, bounded OTLP decode concurrency (HTTP and gRPC) and a 2-second bounded enqueue wait keep /health responsive and rejections observable and retryable under flood, batch CLI inputs up to 1 GiB, HTML dashboard bounds embedded findings critical-first). A settings advisor emits tuning entries in Report.warning_details when lifetime counters show a config knob undersized for the observed load. Carbon outputs shift for the affected regions. Give the liveness probe headroom under sustained saturation (timeoutSeconds 5, failureThreshold 5). No chart template change, this bump only tracks the new appVersion."
    - kind: added
      description: "appVersion 0.8.8: query monitor, a new read-only live operator TUI (perf-sentinel query --daemon <URL> monitor) with five Tab-cycled tabs (settings-advisor hints, the effective energy/carbon mix per service and region, live Trends charts for energy, carbon and runtime headroom, per-backend energy-scraper health, and every [daemon] parameter with its default and an explanation), backed by two new read-only daemon endpoints (GET /api/config, an explicit allowlist that summarizes TLS and ack secrets to booleans and never echoes paths or keys, and GET /api/energy, per-backend scraper health), an extended GET /api/status (runtime caps and live depths), and six new scalar /metrics gauges (perf_sentinel_energy_kwh, perf_sentinel_carbon_gco2, perf_sentinel_max_active_traces, perf_sentinel_analysis_queue_capacity, perf_sentinel_max_retained_findings, perf_sentinel_stored_findings) with three matching Grafana panels. Terminal-output sanitization also strips BiDi and invisible characters, and the self-contained HTML dashboard embed is lighter. All additions are backward compatible. No chart template change, this bump only tracks the new appVersion."
    - kind: fixed
      description: "appVersion 0.8.9: the demo subcommand marks its failed quality-gate verdict as informational (Quality gate: FAILED (informational in demo, would exit 1 under analyze --ci)), since the demo never enforces the gate and always exits 0. Console-only and demo-only, analyze --ci exit behavior and machine exports (JSON, SARIF, HTML, NDJSON) are unchanged. The documented crates.io install command now recommends cargo install perf-sentinel --locked. CLI-only change, no daemon behavior change. No chart template change, this bump only tracks the new appVersion."
    - kind: added
      description: "appVersion 0.8.10: the demo subcommand gains --tui and --html. perf-sentinel demo can now open the interactive TUI report or write the self-contained HTML dashboard in addition to the colored terminal report, and the --html output is a full showcase with every dashboard tab populated from embedded fixtures (findings across all detector types, Explain span trees, GreenOps, a pg_stat ranking, a Diff against an embedded baseline run, and synthesized cross-trace correlations). The embedded demo dataset now exercises all ten detector types across the three severity levels. CLI-only change, no daemon behavior change. No chart template change, this bump only tracks the new appVersion."
    - kind: added
      description: "appVersion 0.8.11: the interactive TUIs gain mouse-drag-resizable panels. The inspect drill-down (Traces, Findings, Correlations, Detail) and the query monitor Trends tab let you drag panel borders to redistribute space, m toggles mouse capture (opt-in, native copy-paste preserved when off), r resets the layout, and hovering a border highlights it with a handle glyph (a terminal cannot change the OS mouse pointer). Panel sizes are per-session, not persisted. No chart template change, this bump only tracks the new appVersion."
    - kind: fixed
      description: "Chart 0.2.57: enabling StatefulSet persistence now wires the daemon's durable state to the mounted PVC. The ConfigMap points [daemon.ack] storage_path at /var/lib/perf-sentinel/acks.jsonl and [daemon.archive] path at /var/lib/perf-sentinel/archive.ndjson whenever workload.kind is StatefulSet and workload.statefulset.persistence.enabled is true, so runtime acknowledgments and the public-disclosure archive survive pod restarts and rescheduling. Previously the volume mounted at /var/lib/perf-sentinel but nothing pointed at it, so the PVC stayed empty, the ack store fell back to a non-writable default under readOnlyRootFilesystem, and disclose archiving was off. The injection is gated on the volume actually being mounted because an unwritable archive path is a fatal startup error. No application change, appVersion stays 0.8.11."
    - kind: fixed
      description: "appVersion 0.8.12: the query monitor Trends tab plots its Energy, Carbon and headroom charts in a fixed-width time window instead of compressing the curves as history accumulates. Each new sample scrolls the curves leftward at a constant rate and the time-span axis labels stay put, and before the window fills its left part stays empty rather than zooming in on the few points collected so far. CLI/TUI-only change, no daemon behavior change. No chart template change, this bump only tracks the new appVersion."
    - kind: changed
      description: "Chart 0.2.59: the post-install notes now warn when workload.replicas exceeds 1 on a non-DaemonSet workload. perf-sentinel keeps per-trace and correlation state in memory, per pod, with no shared state, so a round-robin Service splits one trace's spans across pods and silently degrades N+1 and correlation detection. The note points operators at replicas=1 or trace-aware routing (consistent hashing by trace_id via the OTel Collector loadbalancingexporter). The default resource requests and limits are also raised to match the measured daemon footprint (requests 50m/64Mi, limits 500m/256Mi), which idles near 17Mi but holds 150-190Mi RSS under sustained ingestion, so the kernel no longer OOMKills the pod under load. No application change, appVersion stays 0.8.12."
    - kind: added
      description: "Chart 0.2.60: the chart now ships operator-facing alerting and disruption protection, both opt-in and off by default. An opt-in PrometheusRule (prometheusRule.enabled) packages the daemon's loss and saturation alerts (daemon unreachable via absent(perf_sentinel_active_traces), OTLP rejection, analysis shedding, analysis-queue saturation, findings store near cap, correlator-pair eviction, service-cardinality overflow, plus opt-in per-backend energy-scraper staleness under prometheusRule.energyScrapers), each alert naming the [daemon] knob to raise, with a prometheusRule.additionalRules passthrough for custom rules. An opt-in PodDisruptionBudget (podDisruptionBudget.enabled, default maxUnavailable 1 rather than minAvailable 1 so it does not wedge node drains on the single-replica daemon) adds voluntary-disruption protection. No application change, appVersion stays 0.8.12."
