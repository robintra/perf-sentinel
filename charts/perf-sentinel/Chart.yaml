  artifacthub.io/changes: |
    - kind: added
      description: "appVersion 0.7.4: two opt-in measured-energy sources extend the carbon attribution stack on ARM64 and bare-metal hosts. Kepler (kepler_ebpf) reads eBPF per-container or per-process joule counters. Redfish BMC (redfish_bmc) reads chassis wall-plug watts via the baseboard management controller and attributes them per service proportionally to ops-deltas. The carbon precedence chain becomes electricity_maps_api > scaphandre_rapl > kepler_ebpf > redfish_bmc > cloud_specpower > io_proxy_v3 > io_proxy_v2 > io_proxy_v1. Two new Prometheus gauges are exposed: perf_sentinel_kepler_last_scrape_age_seconds and perf_sentinel_redfish_last_scrape_age_seconds."
    - kind: fixed
      description: "appVersion 0.7.5: align the Kepler scraper to the Kepler v2 upstream metric names (Kepler >= 0.10). The container variant now reads kepler_container_cpu_joules_total (was kepler_container_joules_total). The previous process_package and process_dram metric_kind values targeted metrics that Kepler never published and are removed: use metric_kind = 'process' which reads kepler_process_cpu_joules_total keyed by the comm label. Operators with these legacy values in their .perf-sentinel.toml get a config-load error pointing at the replacement, no silent fallback. The Process variant also caps service_mappings label values at 15 chars to match the kernel's TASK_COMM_LEN truncation. The scraper warns once when an apparently healthy endpoint returns zero matching samples for three consecutive ticks, catching the legacy-Kepler upgrade pitfall. Redfish BMC integration unchanged."
    - kind: changed
      description: "appVersion 0.7.6: two config breaking changes on Scaphandre and Redfish to eliminate silent over-attribution. Scaphandre `process_map` becomes a typed table per service with `exe_contains` plus optional `cmdline_contains` substrings, replacing the previous flat `\"service\" = \"exe\"` form. Substring matching on both labels disambiguates co-located JVMs or .NET assemblies sharing a runtime. Redfish `endpoints` becomes a typed table per chassis with `url` plus `schema` enum (`legacy_power` or `environment_metrics`), the top-level `power_path` field is removed. EnvironmentMetrics (`PowerWatts.Reading`) is now natively supported alongside the legacy `/Power` resource. Both new struct shapes deny unknown TOML fields. Scaphandre adds a zero-sample warn-once net that catches silent upstream renames of the metric or the `exe` label at runtime, mirroring the Kepler net from 0.7.5, and the staleness gauge now climbs from boot on failure parity with Kepler. Wire-conformance CI extended to assert both Scaphandre cmdline disambiguation and Redfish dual-schema parsing against the real upstream binaries."
    - kind: fixed
      description: "appVersion 0.7.7: closes an N+1 SQL detection gap on non-Java stacks. The sanitizer-aware classifier and the SQL normalizer assumed JDBC-style ? placeholders, so Go (pgx $1), Python (psycopg %s, SQLAlchemy :name), .NET (@param) and any stack sending pre-parameterized SQL to the wire was classified as redundant_sql instead of n_plus_one_sql. Sequentiality is now evaluated in microseconds, so sub-millisecond n+1 and serialized-calls patterns no longer slip the gate, strict sanitizer-aware mode reaches parity with auto on bare-driver stacks, and suggested_fix coverage broadens from 3 to 10 anti-patterns across 6 language ecosystems (96 entries, Python, Go and Node.js/TypeScript join Java, C#, Rust). Operators with strict quality_gate rules should re-baseline n_plus_one_sql_critical_max, serialized_calls_critical_max and pool_saturation_critical_max, previously redundant_sql warnings may resurface as n_plus_one_sql criticals (same defects, sharper label)."
    - kind: added
      description: "appVersion 0.7.8: closes the suggested_fix coverage gaps from the v0.7.7 lab and extends N+1 detection to HTTP. Vendor-specific OTel scope recognition resolves a framework for scopes outside the io.opentelemetry.* convention (.NET EF Core via OpenTelemetry.Instrumentation.EntityFrameworkCore or Microsoft.EntityFrameworkCore, Quarkus via io.quarkus.*). A last-resort service-name fallback infers the framework from a distinctive substring in the service name when scopes and code_location are absent. HTTP N+1 sanitizer-aware classification reclassifies same-URL high-occurrence HTTP groups with timing variance from redundant_http to n_plus_one_http. No config, CLI, daemon wire, or report JSON change. Known limitation documented: OpenTelemetry .NET redacts the query string to ?* by default, so query-parameter HTTP N+1 loops stay redundant_http unless OTEL_DOTNET_EXPERIMENTAL_HTTPCLIENT_DISABLE_URL_QUERY_REDACTION=true is set."
    - kind: added
      description: "appVersion 0.8.0: the inspect TUI becomes a unified multi-view interface. Two views join the existing Inspect browser, Analyze (GreenOps summary with I/O waste ratio, top offenders, quality gate, findings by severity) and Explain (the selected trace's annotated span tree, full screen). Enter descends Analyze -> Inspect -> Explain and Esc ascends back. analyze --tui and explain --tui open the TUI directly, their default stdout output is unchanged because --tui conflicts with --format and --ci. Under query inspect the Analyze view is fed live from /api/export/report, degrading to a hint on older daemons. No chart template change, this bump only tracks the new appVersion."
    - kind: changed
      description: "appVersion 0.8.1: patch release with no daemon-facing change. The SQL tokenizer slice path gains a debug-only char-boundary assertion (compiled out in release) as a refactor guard, disclose state initialization is simplified, and the release profile rationale now documents why overflow-checks stays off in release. Remaining changes are release tooling (Helm chart release automation script) and documentation. No chart template change, this bump only tracks the new appVersion."
    - kind: added
      description: "appVersion 0.8.2: the periodic public disclosure reports avoidable energy and carbon at two N+1 thresholds side by side, canonical_waste (a threshold pinned in the binary that the operator cannot configure, so the disclosed waste figure is non-manipulable) and operational_waste (the operator's configured threshold), schema perf-sentinel-report/v1.1. The flat avoidable fields alias the canonical tier and the change is additive, v1.0 readers remain valid. Also bumps the TUI backend to ratatui 0.30.1. No chart template change, this bump only tracks the new appVersion."
    - kind: added
      description: "appVersion 0.8.3: the periodic public disclosure gains a temporal-coverage continuity signal (aggregate.temporal_coverage, schema perf-sentinel-report/v1.2) that reports how many of the declared period's calendar days carried measurements, so a reader can tell a continuously-measured period from one where the daemon ran only a few days. Archiving is traffic-gated so the figure is a lower bound on activity, not daemon uptime, surfaced as a warning and an in-band disclaimer, never a hard official gate. Also adds an in-band coverage_basis provenance marker and reserves an integrity.cross_period_log hook. The schema change is additive, v1.1 and v1.0 readers remain valid. No chart template change, this bump only tracks the new appVersion."
    - kind: added
      description: "appVersion 0.8.4: a man subcommand renders the perf-sentinel manual page to stdout (perf-sentinel man, backed by clap_mangen), mirroring the existing completions subcommand. Every user-facing command's --help now carries copy-pasteable usage examples, and several command help texts were tightened. No chart template change, this bump only tracks the new appVersion."
    - kind: changed
      description: "appVersion 0.8.5: a normal Kubernetes pod termination (SIGTERM from a rolling update or scale-down) now drains the daemon's in-flight streaming window through detection instead of dropping it, matching the existing SIGINT (Ctrl+C) behavior, via a shared shutdown-signal helper that also aborts in-flight Tempo fetches. Only an ungraceful kill (SIGKILL after the grace period, OOM) still loses the window, so set terminationGracePeriodSeconds above the daemon's window duration to benefit. The Windows daemon binary and core test suite also build and run now. No chart template change, this bump only tracks the new appVersion."
    - kind: changed
      description: "appVersion 0.8.6: the daemon's ingestion channel and analysis-worker queue depths are now configurable via [daemon] ingest_queue_capacity and analysis_queue_capacity (both default 1024), and the base CarbonContext is shared across analysis batches by Arc instead of being deep-cloned on every evicted batch. No chart template change, this bump only tracks the new appVersion."
    - kind: changed
      description: "appVersion 0.8.7: four new daemon loss-observability counters (perf_sentinel_otlp_spans_received_total, perf_sentinel_otlp_spans_filtered_total by reason, perf_sentinel_service_io_ops_overflow_total, perf_sentinel_correlator_pairs_evicted_total) make previously silent drop paths visible; a primary-source audit refreshes the embedded carbon data (Paris regions 56 to 41 gCO2eq/kWh, Sao Paulo 62 to 96, Belgium 187 to 165, the eu-central-1 hourly profile rescaled from its stale 2022 level to the Electricity Maps 2024 level, generic PUE 1.2 to 1.5); and the limit-testing campaign hardens wide-topology and saturation behavior (correlator pair admission control fixes a 1500-service OOM, bounded OTLP decode concurrency (HTTP and gRPC) and a 2-second bounded enqueue wait keep /health responsive and rejections observable and retryable under flood, batch CLI inputs up to 1 GiB, HTML dashboard bounds embedded findings critical-first). A settings advisor emits tuning entries in Report.warning_details when lifetime counters show a config knob undersized for the observed load. Carbon outputs shift for the affected regions. Give the liveness probe headroom under sustained saturation (timeoutSeconds 5, failureThreshold 5). No chart template change, this bump only tracks the new appVersion."
    - kind: added
      description: "appVersion 0.8.8: query monitor, a new read-only live operator TUI (perf-sentinel query --daemon <URL> monitor) with five Tab-cycled tabs (settings-advisor hints, the effective energy/carbon mix per service and region, live Trends charts for energy, carbon and runtime headroom, per-backend energy-scraper health, and every [daemon] parameter with its default and an explanation), backed by two new read-only daemon endpoints (GET /api/config, an explicit allowlist that summarizes TLS and ack secrets to booleans and never echoes paths or keys, and GET /api/energy, per-backend scraper health), an extended GET /api/status (runtime caps and live depths), and six new scalar /metrics gauges (perf_sentinel_energy_kwh, perf_sentinel_carbon_gco2, perf_sentinel_max_active_traces, perf_sentinel_analysis_queue_capacity, perf_sentinel_max_retained_findings, perf_sentinel_stored_findings) with three matching Grafana panels. Terminal-output sanitization also strips BiDi and invisible characters, and the self-contained HTML dashboard embed is lighter. All additions are backward compatible. No chart template change, this bump only tracks the new appVersion."
    - kind: fixed
      description: "appVersion 0.8.9: the demo subcommand marks its failed quality-gate verdict as informational (Quality gate: FAILED (informational in demo, would exit 1 under analyze --ci)), since the demo never enforces the gate and always exits 0. Console-only and demo-only, analyze --ci exit behavior and machine exports (JSON, SARIF, HTML, NDJSON) are unchanged. The documented crates.io install command now recommends cargo install perf-sentinel --locked. CLI-only change, no daemon behavior change. No chart template change, this bump only tracks the new appVersion."
