apiVersion: v2
name: perf-sentinel
description: |
  Lightweight polyglot performance anti-pattern detector for distributed
  traces. Detects N+1 queries, redundant calls, chatty services, connection
  pool saturation, serialized parallelizable calls, fanout. Scores I/O
  intensity per endpoint (GreenOps).
type: application
version: 0.2.39
appVersion: "0.7.4"
kubeVersion: ">=1.24.0-0"
home: https://github.com/robintra/perf-sentinel
icon: https://raw.githubusercontent.com/robintra/perf-sentinel/main/logo/logo-horizontal.svg
sources:
  - https://github.com/robintra/perf-sentinel
keywords:
  - performance
  - n-plus-one
  - observability
  - opentelemetry
  - greenops
maintainers:
  - name: robintra
    url: https://github.com/robintra
annotations:
  category: Observability
  licenses: AGPL-3.0-only

  artifacthub.io/category: monitoring-logging
  artifacthub.io/license: AGPL-3.0-only
  artifacthub.io/official: "true"
  artifacthub.io/links: |
    - name: Source
      url: https://github.com/robintra/perf-sentinel
    - name: Documentation
      url: https://github.com/robintra/perf-sentinel/tree/main/docs
    - name: Helm deployment guide
      url: https://github.com/robintra/perf-sentinel/blob/main/docs/HELM-DEPLOYMENT.md
  artifacthub.io/changes: |
    - kind: added
      description: "appVersion 0.7.4: two new opt-in measured-energy sources extend the carbon attribution stack on ARM64 and bare-metal hosts. Kepler (kepler_ebpf) reads eBPF per-container or per-process joule counters, either directly from a Kepler exporter or through Prometheus when Kepler runs as a DaemonSet. Redfish BMC (redfish_bmc) reads chassis wall-plug watts from the baseboard management controller and attributes them per service proportionally to ops-deltas, with operator-supplied CA bundle support for self-signed certificates. The carbon precedence chain becomes electricity_maps_api > scaphandre_rapl > kepler_ebpf > redfish_bmc > cloud_specpower > io_proxy_v3 > io_proxy_v2 > io_proxy_v1. Two new Prometheus gauges are exposed: perf_sentinel_kepler_last_scrape_age_seconds and perf_sentinel_redfish_last_scrape_age_seconds. Both sources are off by default, the +cal calibration suffix continues to apply to proxy models only."
  artifacthub.io/images: |
    - name: perf-sentinel
      image: ghcr.io/robintra/perf-sentinel:0.7.4
      platforms:
        - linux/amd64
        - linux/arm64

