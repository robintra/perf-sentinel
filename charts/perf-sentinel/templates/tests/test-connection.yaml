apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "perf-sentinel.testPodName" . | quote }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "perf-sentinel.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": test
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  backoffLimit: 0
  ttlSecondsAfterFinished: 30
  template:
    metadata:
      labels:
        {{- include "perf-sentinel.selectorLabels" . | nindent 8 }}
    spec:
      restartPolicy: Never
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: wget
          image: busybox:1.36.1
          # Short retry loop absorbs the CoreDNS warm-up race on a freshly started cluster.
          command:
            - sh
            - -c
            - >-
              url="http://{{ include "perf-sentinel.fullname" . }}.{{ .Release.Namespace }}.svc.cluster.local:{{ .Values.service.ports.otlpHttp.port }}/health";
              for i in 1 2 3 4 5; do wget --spider -q "$url" && exit 0; sleep 3; done;
              exit 1
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
