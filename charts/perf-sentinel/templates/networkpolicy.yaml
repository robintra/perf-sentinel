{{- if .Values.networkPolicy.enabled -}}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "perf-sentinel.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "perf-sentinel.labels" . | nindent 4 }}
  {{- with .Values.commonAnnotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  podSelector:
    matchLabels:
      {{- include "perf-sentinel.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
  {{- if or .Values.networkPolicy.ingress.fromNamespaceSelectors .Values.networkPolicy.ingress.fromPodSelectors }}
  ingress:
    - from:
        {{- range .Values.networkPolicy.ingress.fromNamespaceSelectors }}
        - namespaceSelector:
            {{- toYaml . | nindent 12 }}
        {{- end }}
        {{- range .Values.networkPolicy.ingress.fromPodSelectors }}
        - podSelector:
            {{- toYaml . | nindent 12 }}
        {{- end }}
      ports:
        - protocol: TCP
          port: {{ .Values.service.ports.otlpGrpc.port }}
        - protocol: TCP
          port: {{ .Values.service.ports.otlpHttp.port }}
  {{- else }}
  # No ingress selectors supplied: deny all ingress (fail-closed). Add
  # entries under .Values.networkPolicy.ingress.fromNamespaceSelectors or
  # .fromPodSelectors to allow-list specific peers.
  ingress: []
  {{- end }}
{{- end }}
