apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "perf-sentinel.configMapName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "perf-sentinel.labels" . | nindent 4 }}
  {{- with .Values.commonAnnotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
data:
  perf-sentinel.toml: |
    {{- .Values.config.toml | nindent 4 }}
    {{- if eq (include "perf-sentinel.persistenceEnabled" .) "true" }}

    # Appended by the chart because persistence is enabled: point the runtime
    # ack store and the disclose archive at the mounted PVC so they survive
    # restarts. Do not also set [daemon.ack] or [daemon.archive] in config.toml
    # above, TOML rejects duplicate tables.
    [daemon.ack]
    storage_path = "{{ include "perf-sentinel.dataDir" . }}/acks.jsonl"

    [daemon.archive]
    path = "{{ include "perf-sentinel.dataDir" . }}/archive.ndjson"
    {{- end }}
