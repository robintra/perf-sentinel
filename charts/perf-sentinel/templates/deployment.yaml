{{- if eq .Values.workload.kind "Deployment" -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "perf-sentinel.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "perf-sentinel.labels" . | nindent 4 }}
  {{- with .Values.commonAnnotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  replicas: {{ .Values.workload.replicas }}
  {{- with .Values.workload.strategy }}
  strategy:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "perf-sentinel.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        {{- include "perf-sentinel.podAnnotations" . | nindent 8 }}
      labels:
        {{- include "perf-sentinel.podLabels" . | nindent 8 }}
    spec:
      {{- include "perf-sentinel.podSpec" . | nindent 6 }}
{{- end }}
