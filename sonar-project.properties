sonar.organization=robintrassard
sonar.projectKey=robintrassard_perf-sentinel
sonar.projectName=perf-sentinel

sonar.sources=crates/sentinel-core/src,crates/sentinel-cli/src
sonar.tests=crates/sentinel-core/tests,crates/sentinel-cli/tests
sonar.exclusions=**/target/**

sonar.rust.lcov.reportPaths=lcov.info
sonar.rust.clippy.reportPaths=clippy-report.json
# Disable Sonar's server-side Clippy auto-run: we already hand it the
# pre-generated report above, and its worker-side cargo clippy invocation
# fails to compile the workspace (noisy sensor warning on every green run).
sonar.rust.clippy.enabled=false
sonar.host.url=https://sonarcloud.io
