sonar.organization=robintrassard
sonar.projectKey=robintrassard_perf-sentinel
sonar.projectName=perf-sentinel

sonar.sources=crates/sentinel-core/src,crates/sentinel-cli/src
sonar.tests=crates/sentinel-core/tests,crates/sentinel-cli/tests
sonar.exclusions=**/target/**

# Coverage exclusions: the CLI crate's I/O boundary is integration-tested
# (e2e via assert_cmd, the Playwright dashboard suite, daemon integration
# tests), not unit-testable. Terminal rendering, the interactive TUI event
# loop, the CLI entry/launchers and the daemon HTTP client cannot be covered
# meaningfully by unit tests, so they would skew new-code coverage without
# adding signal. The business logic (core pipeline, detection, scoring,
# periodic disclosure, and the disclose preview state/maths in disclose.rs)
# stays measured. monitor.rs joins for the same reason as tui.rs: it is the
# live operator TUI (ratatui draw functions, the crossterm event loop, the
# tokio poller and its daemon HTTP fetches), none of it meaningfully
# unit-testable. Its pure logic (snapshot parsing, line and trend building,
# config and chart formatting, scroll and tab state) stays inline-tested.
# main.rs was split into sibling per-subcommand files (pg_stat, demo, bench,
# tui_launch, tempo_cmd, jaeger_cmd); they carry the same CLI entry, launcher
# and terminal-rendering surface that main.rs did, so they stay excluded as a
# group. tui.rs became the tui/ module, hence the glob.
sonar.coverage.exclusions=crates/sentinel-cli/src/main.rs,crates/sentinel-cli/src/pg_stat.rs,crates/sentinel-cli/src/demo.rs,crates/sentinel-cli/src/bench.rs,crates/sentinel-cli/src/tui_launch.rs,crates/sentinel-cli/src/tempo_cmd.rs,crates/sentinel-cli/src/jaeger_cmd.rs,crates/sentinel-cli/src/tui/**,crates/sentinel-cli/src/monitor.rs,crates/sentinel-cli/src/render.rs,crates/sentinel-cli/src/query.rs

# Kepler is a deliberate mirror of Scaphandre: same Prometheus exposition
# format, same HTTP scraper boilerplate, same test fixtures. The duplication
# is documented in the GreenOps design notes and is the intentional cost of
# keeping the two energy sources independently understandable. Sonar's CPD
# sensor cannot distinguish deliberate mirroring from accidental copy-paste,
# so the three files where the mirror is mechanical are excluded.
sonar.cpd.exclusions=crates/sentinel-core/src/score/kepler/parser.rs,crates/sentinel-core/src/score/kepler/scraper.rs,crates/sentinel-core/src/score/kepler/tests.rs

sonar.rust.lcov.reportPaths=lcov.info
sonar.rust.clippy.reportPaths=clippy-report.json
# Disable Sonar's server-side Clippy auto-run: we already hand it the
# pre-generated report above, and its worker-side cargo clippy invocation
# fails to compile the workspace (noisy sensor warning on every green run).
sonar.rust.clippy.enabled=false
sonar.host.url=https://sonarcloud.io
