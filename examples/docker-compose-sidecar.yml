# Sidecar topology
#
# perf-sentinel runs alongside a single service, sharing its network
# namespace. The application sends OTLP traces to localhost.
#
#   +-----------------------------------+
#   | pod / compose service group       |
#   |                                   |
#   |  app --> localhost:4317/4318       |
#   |          perf-sentinel (watch)    |
#   +-----------------------------------+

services:
  app:
    image: your-app:latest
    environment:
      # Point OpenTelemetry SDK to localhost (perf-sentinel sidecar)
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://localhost:4318"
      OTEL_EXPORTER_OTLP_PROTOCOL: "http/protobuf"

  perf-sentinel:
    image: ghcr.io/robintra/perf-sentinel:latest
    # Share the app's network namespace so localhost works. The reference
    # config (`listen_address = "127.0.0.1"`) is valid here because both
    # containers see the same loopback. For the collector topology (separate
    # containers), use `perf-sentinel-docker.toml` instead.
    command: ["watch", "--config", "/etc/perf-sentinel/.perf-sentinel.toml"]
    volumes:
      - ./perf-sentinel.toml:/etc/perf-sentinel/.perf-sentinel.toml:ro
    # environment:
    #   # Inject secrets via env vars, never in the config file.
    #   ELECTRICITY_MAPS_API_KEY: "${ELECTRICITY_MAPS_API_KEY}"
    network_mode: "service:app"
    # Prometheus /metrics and liveness /health available at app's IP on port 4318.
    # For an explicit Compose healthcheck, see docker-compose-collector.yml.
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
