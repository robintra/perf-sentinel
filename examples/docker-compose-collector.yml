# Central collector topology
#
# Applications send OTLP traces to the OpenTelemetry Collector,
# which forwards them to perf-sentinel for analysis.
#
#   app-1 --\
#   app-2 ---+--> otel-collector --> perf-sentinel (watch)
#   app-3 --/
#
# Usage:
#   docker compose -f docker-compose-collector.yml up
#
# Then configure your applications to export traces to:
#   gRPC: localhost:4317
#   HTTP: localhost:4318
#
# perf-sentinel Prometheus metrics available at:
#   http://localhost:14318/metrics

services:
  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    ports:
      - "127.0.0.1:4317:4317"   # OTLP gRPC (apps send traces here)
      - "127.0.0.1:4318:4318"   # OTLP HTTP (apps send traces here)
    volumes:
      - ./otel-collector-config.yaml:/etc/otelcol/config.yaml:ro
    depends_on:
      perf-sentinel:
        condition: service_started
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:13133"]
      interval: 10s
      timeout: 5s
      retries: 3

  perf-sentinel:
    image: ghcr.io/robintra/perf-sentinel:latest
    # Equivalent to: perf-sentinel watch
    ports:
      - "127.0.0.1:14318:4318"  # Prometheus /metrics + OTLP HTTP from collector
      - "127.0.0.1:14317:4317"  # OTLP gRPC from collector
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:4318/metrics"]
      interval: 10s
      timeout: 5s
      retries: 3
