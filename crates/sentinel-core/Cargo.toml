[package]
name = "sentinel-core"
description = "Core library for perf-sentinel — polyglot performance anti-pattern detector"
version.workspace = true
edition.workspace = true
license.workspace = true
rust-version.workspace = true

[dependencies]
serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1.0.149"
tracing = "0.1.44"
thiserror = "2.0.18"
toml = "1.0.6"
regex = "1.12.3"
tokio = { version = "1.50.0", features = ["full"] }
tonic = "0.14"
prost = "0.14"
prost-types = "0.14"
opentelemetry-proto = { version = "0.31", features = ["gen-tonic-messages", "trace"] }
axum = "0.8"
