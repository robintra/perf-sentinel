[package]
name = "sentinel-core"
description = "Core library for perf-sentinel: polyglot performance anti-pattern detector"
version.workspace = true
edition.workspace = true
license.workspace = true
rust-version.workspace = true
repository.workspace = true
homepage.workspace = true
keywords.workspace = true
categories.workspace = true
readme = "../../README.md"

[dependencies]
serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1.0.149"
tracing = "0.1.44"
thiserror = "2.0.18"
toml = "1.1.0"
regex = "1.12.3"
tokio = { version = "1.50.0", features = ["full"] }
tonic = "0.14.5"
prost = "0.14.3"
opentelemetry-proto = { version = "0.31.0", features = ["gen-tonic-messages", "trace"] }
axum = "0.8.8"
tower = { version = "0.5.3", features = ["timeout"] }
prometheus = "0.14.0"
lru = "0.16.3"

[dev-dependencies]
http-body-util = "0.1.3"
tower = { version = "0.5.3", features = ["util", "timeout"] }
