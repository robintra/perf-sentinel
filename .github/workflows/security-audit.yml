name: Security Audit

on:
  push:
    branches: [main]
    paths:
      - 'Cargo.lock'
      - 'Cargo.toml'
      - 'crates/**/Cargo.toml'
      - '.github/workflows/security-audit.yml'
  pull_request:
    branches: [main]
    paths:
      - 'Cargo.lock'
      - 'Cargo.toml'
      - 'crates/**/Cargo.toml'
  schedule:
    - cron: '17 6 * * *'

jobs:
  audit:
    name: Cargo Audit
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions-rust-lang/audit@72c09e02f132669d52284a3323acdb503cfc1a24 # v1.2.7
        name: Audit Rust Dependencies
        with:
          # Advisories that are documented as non-applicable to this
          # workspace live in `audit.toml` at the repo root. We also
          # echo the list here so the workflow stays self-describing
          # even if `audit.toml` is moved or refactored. See
          # `audit.toml` for the full exposure analysis.
          ignore: RUSTSEC-2026-0097
