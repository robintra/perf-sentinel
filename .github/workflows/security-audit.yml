name: Security Audit

on:
  push:
    branches: [main]
    paths:
      - 'Cargo.lock'
      - 'Cargo.toml'
      - 'crates/**/Cargo.toml'
      - 'deny.toml'
      - '.github/workflows/security-audit.yml'
  pull_request:
    branches: [main]
    paths:
      - 'Cargo.lock'
      - 'Cargo.toml'
      - 'crates/**/Cargo.toml'
      - 'deny.toml'
  schedule:
    - cron: '17 6 * * *'

# Default-deny the GITHUB_TOKEN. The audit job re-grants issues: write to
# file advisories as GitHub issues.
permissions:
  contents: read

jobs:
  audit:
    name: Cargo Audit
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions-rust-lang/audit@72c09e02f132669d52284a3323acdb503cfc1a24 # v1.2.7
        name: Audit Rust Dependencies
        with:
          # Advisories that are documented as non-applicable to this
          # workspace live in `audit.toml` at the repo root. We also
          # echo the list here so the workflow stays self-describing
          # even if `audit.toml` is moved or refactored. See
          # `audit.toml` for the full exposure analysis.
          ignore: RUSTSEC-2026-0097

  # Supply-chain policy gate driven by deny.toml: advisories, bans, license
  # compatibility (AGPL-3.0-only) and crate sources. The advisory overlap with
  # the cargo-audit job above is intentional, cargo-deny layers the bans,
  # license and source checks on top.
  deny:
    name: Cargo Deny
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      # cargo-deny is a prebuilt binary and `cargo deny check` only runs
      # `cargo metadata`, so the runner's cargo (pinned to 1.97.1 by
      # rust-toolchain.toml on first use) suffices, no toolchain step needed.
      # Pinned to match the deny.toml schema target (cargo-deny 0.19.x).
      - uses: taiki-e/install-action@43aecc8d72668fbcfe75c31400bc4f890f1c5853 # v2.83.2
        with:
          tool: cargo-deny@0.19.8
      - name: cargo deny check
        run: cargo deny check
