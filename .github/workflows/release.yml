name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  packages: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: perf-sentinel-linux-amd64
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: perf-sentinel-linux-arm64
            cross: true
          - target: aarch64-apple-darwin
            os: macos-latest
            artifact: perf-sentinel-macos-arm64
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            artifact: perf-sentinel-windows-amd64.exe

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # stable
        with:
          toolchain: stable
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2
        with:
          key: ${{ matrix.target }}

      - name: Install cross
        if: matrix.cross
        run: cargo install cross --locked --version 0.2.5

      - name: Build (cross)
        if: matrix.cross
        run: cross build --release --target ${{ matrix.target }} -p perf-sentinel

      - name: Build (native)
        if: ${{ !matrix.cross }}
        run: cargo build --release --target ${{ matrix.target }} -p perf-sentinel

      - name: Rename binary (Unix)
        if: runner.os != 'Windows'
        run: cp target/${{ matrix.target }}/release/perf-sentinel ${{ matrix.artifact }}

      - name: Rename binary (Windows)
        if: runner.os == 'Windows'
        run: cp target/${{ matrix.target }}/release/perf-sentinel.exe ${{ matrix.artifact }}

      - name: Upload artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Download all artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate SHA256 checksums
        run: |
          cd artifacts
          sha256sum * > SHA256SUMS.txt

      - name: Create release
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # v2
        with:
          generate_release_notes: true
          files: artifacts/*

  publish-crate:
    name: Publish to crates.io
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # stable
        with:
          toolchain: stable

      # Strict publish: succeed on a real upload, succeed on an idempotent
      # re-run (crate version already on crates.io), fail loudly on any
      # other error. The previous `|| echo warning` pattern hid a real
      # compile failure during `cargo publish --verify` behind a green job
      # — see post-mortem on https://github.com/robintra/perf-sentinel/releases/tag/v0.4.0.
      - name: Publish perf-sentinel-core
        shell: bash
        run: |
          set +e
          cargo publish -p perf-sentinel-core 2>&1 | tee /tmp/publish-core.log
          status=${PIPESTATUS[0]}
          set -e
          if [ "$status" -eq 0 ]; then
            echo "::notice::perf-sentinel-core published"
            exit 0
          fi
          if grep -qE "already (uploaded|exists on crates\.io)" /tmp/publish-core.log; then
            echo "::warning::perf-sentinel-core already on crates.io (idempotent re-run), skipping"
            exit 0
          fi
          echo "::error::perf-sentinel-core publish failed with a non-duplicate error; see log above"
          exit 1
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_IO_TOKEN }}

      # Fail hard after the retry budget is exhausted so the next step
      # doesn't silently compound the error. The previous loop always
      # exited 0 whether or not the crate showed up in the index.
      - name: Wait for crates.io index update
        shell: bash
        run: |
          for i in $(seq 1 30); do
            if cargo search perf-sentinel-core 2>/dev/null | grep -q "^perf-sentinel-core "; then
              echo "::notice::perf-sentinel-core is visible on the crates.io index"
              exit 0
            fi
            echo "Waiting for perf-sentinel-core to appear in crates.io index... (attempt $i/30)"
            sleep 10
          done
          echo "::error::perf-sentinel-core did not appear on the crates.io index after 5 minutes"
          exit 1

      - name: Publish perf-sentinel
        shell: bash
        run: |
          set +e
          cargo publish -p perf-sentinel 2>&1 | tee /tmp/publish-cli.log
          status=${PIPESTATUS[0]}
          set -e
          if [ "$status" -eq 0 ]; then
            echo "::notice::perf-sentinel published"
            exit 0
          fi
          if grep -qE "already (uploaded|exists on crates\.io)" /tmp/publish-cli.log; then
            echo "::warning::perf-sentinel already on crates.io (idempotent re-run), skipping"
            exit 0
          fi
          echo "::error::perf-sentinel publish failed with a non-duplicate error; see log above"
          exit 1
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_IO_TOKEN }}

  docker:
    name: Docker image
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Download Linux amd64 binary
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: perf-sentinel-linux-amd64

      - name: Download Linux arm64 binary
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: perf-sentinel-linux-arm64

      - name: Prepare binaries
        run: |
          mkdir -p build/linux-amd64 build/linux-arm64
          cp perf-sentinel-linux-amd64 build/linux-amd64/perf-sentinel
          cp perf-sentinel-linux-arm64 build/linux-arm64/perf-sentinel
          chmod +x build/linux-amd64/perf-sentinel build/linux-arm64/perf-sentinel

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0

      - name: Set up QEMU
        uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3.7.0

      - name: Log in to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.7.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.7.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract version
        id: version
        run: echo "tag=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"

      - name: Build and push multi-arch image
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6.19.2
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/robintra/perf-sentinel:${{ steps.version.outputs.tag }}
            ghcr.io/robintra/perf-sentinel:latest
            robintrassard/perf-sentinel:${{ steps.version.outputs.tag }}
            robintrassard/perf-sentinel:latest
