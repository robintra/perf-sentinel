name: Release

on:
  push:
    tags:
      - 'v*'

# Workflow-level permissions are the floor. Each job below narrows
# further via its own `permissions:` block so the principle of least
# privilege applies: `build` and `publish-crate` get read-only access,
# `release` gets write to upload assets, `docker` gets `packages: write`
# to push the container image.
permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  # First gate: refuse to publish anything if the tag does not match
  # every Cargo.toml in the workspace. Logic lives in
  # scripts/check-tag-version.sh so it can also run locally before
  # tagging. Every downstream job depends on this via transitive
  # `needs:` through `build`.
  check-versions:
    name: Verify tag matches Cargo.toml
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Assert tag matches every Cargo.toml in the workspace
        run: scripts/check-tag-version.sh "${GITHUB_REF_NAME}"

  build:
    needs: check-versions
    permissions:
      contents: read
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux binaries target musl, not glibc, so they are statically linked
          # and run on any distro (including `FROM scratch` images) regardless
          # of the runner's glibc version. Both build natively on a matching-arch
          # runner (amd64 on ubuntu-latest, arm64 on ubuntu-24.04-arm), which is
          # what lets cargo-auditable embed audit data into each, arm64 included.
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            artifact: perf-sentinel-linux-amd64
            musl: true
          - target: aarch64-unknown-linux-musl
            os: ubuntu-24.04-arm
            artifact: perf-sentinel-linux-arm64
            musl: true
          - target: aarch64-apple-darwin
            os: macos-latest
            artifact: perf-sentinel-macos-arm64
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            artifact: perf-sentinel-windows-amd64.exe

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: stable

      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          key: ${{ matrix.target }}

      # musl-tools provides musl-gcc, needed by ring's build.rs to produce the
      # statically linked musl binaries. Both Linux targets build natively on a
      # matching-arch runner, so each gets its own host-arch musl-gcc from apt.
      - name: Install musl-tools
        if: matrix.musl
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      # `rust-toolchain.toml` pins 1.96.0 and rustup auto-installs it on the
      # first cargo call. The target must be added to THAT toolchain, not to
      # the `stable` channel the action sets up (they are different versions).
      # The two musl targets add a cross-libc target onto their host toolchain;
      # the macOS and Windows entries add their own host triple, a harmless
      # no-op.
      - name: Add build target to the pinned toolchain
        run: |
          cargo --version
          rustup target add ${{ matrix.target }}

      # cargo-auditable embeds the resolved dependency list into each binary so
      # `cargo audit bin <file>` works on the shipped artifact, not just on the
      # repo's Cargo.lock. Installed from prebuilt releases by
      # taiki-e/install-action (the same action ci.yml uses), version-pinned to
      # match the repo's pinning discipline. All four targets build natively
      # (the aarch64-musl build moved off the `cross` Docker tool onto an arm64
      # runner), so every released binary carries the embedded data.
      - name: Install cargo-auditable
        uses: taiki-e/install-action@9e1e5806d4a4822de933115878265be9aaa786d9 # v2.82.2
        with:
          tool: cargo-auditable@0.7.5

      # Belt-and-suspenders for the native arm64 musl build: point ring's
      # build.rs (via the cc crate) at the musl wrapper rather than letting it
      # fall back to the glibc gcc the runner ships by default. `musl-gcc` comes
      # from the musl-tools package installed above. The cc crate only reads
      # CC_<target> when building for that target, so this is an inert no-op for
      # the x86_64, macOS and Windows entries (where musl-gcc may not even exist).
      - name: Build (with embedded audit data)
        env:
          CC_aarch64_unknown_linux_musl: musl-gcc
        run: cargo auditable build --release --target ${{ matrix.target }} -p perf-sentinel

      - name: Rename binary (Unix)
        if: runner.os != 'Windows'
        run: cp target/${{ matrix.target }}/release/perf-sentinel ${{ matrix.artifact }}

      - name: Rename binary (Windows)
        if: runner.os == 'Windows'
        run: cp target/${{ matrix.target }}/release/perf-sentinel.exe ${{ matrix.artifact }}

      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  # SPDX SBOM for the release binary, attested under the SPDX predicate, in the
  # same shape as the chart's SBOM job in helm-release.yml so the whole project
  # tells one SBOM story. Syft reads the dependency list straight from the
  # cargo-auditable data embedded in the Linux amd64 binary (the most-downloaded
  # artifact and the base of the amd64 container image). The four binaries share
  # their Rust dependency closure bar a few platform-shim crates, so this one
  # SBOM documents the release. The `release` job (needs: [build, sbom]) picks
  # the file up via the merged artifact download and ships it as a release asset.
  sbom:
    name: Generate SBOM and attest
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write     # OIDC token for the SBOM attestation signing
      attestations: write # store the SBOM attestation on the repo
    steps:
      - name: Download the Linux amd64 binary
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: perf-sentinel-linux-amd64
          path: out

      - name: Generate SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          file: out/perf-sentinel-linux-amd64
          format: spdx-json
          artifact-name: perf-sentinel-sbom.spdx.json
          output-file: out/perf-sentinel-sbom.spdx.json
          upload-artifact: true
          upload-release-assets: false

      - name: Attest SBOM
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 # v4.1.0
        with:
          subject-path: out/perf-sentinel-linux-amd64
          predicate-type: https://spdx.dev/Document/v2.3
          predicate-path: out/perf-sentinel-sbom.spdx.json

  # SLSA Build L3 provenance attestation for every release binary.
  # Stored in the GitHub attestations API (no release asset), queryable
  # via `gh attestation verify <binary> --owner robintra --repo perf-sentinel`.
  # Migrated in 0.7.1 from `slsa-framework/slsa-github-generator` (in
  # de-facto maintenance since v2.1.0, 2025-02-24) to the GitHub-native
  # `actions/attest-build-provenance` (maintained under the actions/ org).
  release:
    name: Create GitHub Release
    needs: [build, sbom]
    runs-on: ubuntu-latest
    permissions:
      contents: write     # softprops/action-gh-release uploads release assets
      id-token: write     # OIDC token for Sigstore signing of the attestation
      attestations: write # store the attestation on the repo
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Download all artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate SHA256 checksums
        run: |
          cd artifacts
          # Checksum the release artifacts by their shared `perf-sentinel-`
          # prefix (the 4 binaries plus the SBOM, the same set the attestation
          # below covers) rather than `*`. On a clean dir `*` is already safe
          # (bash expands the glob before the redirect creates SHA256SUMS.txt),
          # but the explicit prefix also keeps the sums file out should the dir
          # ever be reused, and documents intent.
          sha256sum perf-sentinel-* > SHA256SUMS.txt

      - name: Attest binaries
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: 'artifacts/perf-sentinel-*'

      - name: Create release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          generate_release_notes: true
          files: artifacts/*

  publish-crate:
    name: Publish to crates.io
    needs: release
    runs-on: ubuntu-latest
    permissions:
      contents: read # crates.io publish uses CARGO_REGISTRY_TOKEN, no GitHub scope needed
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: stable

      # Strict publish: succeed on a real upload, succeed on an idempotent
      # re-run (crate version already on crates.io), fail loudly on any
      # other error. The previous `|| echo warning` pattern hid a real
      # compile failure during `cargo publish --verify` behind a green job
      # See post-mortem on https://github.com/robintra/perf-sentinel/releases/tag/v0.4.0.
      - name: Publish perf-sentinel-core
        shell: bash
        run: |
          set +e
          cargo publish -p perf-sentinel-core 2>&1 | tee /tmp/publish-core.log
          status=${PIPESTATUS[0]}
          set -e
          if [ "$status" -eq 0 ]; then
            echo "::notice::perf-sentinel-core published"
            exit 0
          fi
          if grep -qE "already (uploaded|exists on crates\.io)" /tmp/publish-core.log; then
            echo "::warning::perf-sentinel-core already on crates.io (idempotent re-run), skipping"
            exit 0
          fi
          echo "::error::perf-sentinel-core publish failed with a non-duplicate error; see log above"
          exit 1
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_IO_TOKEN }}

      # Fail hard after the retry budget is exhausted so the next step
      # doesn't silently compound the error. The previous loop always
      # exited 0 whether or not the crate showed up in the index.
      #
      # Uses the crates.io REST API (refreshed on publish) instead of
      # `cargo search` (which reads the sparse index and can lag for
      # 10+ minutes after a successful publish, as observed on v0.4.1).
      # Asserts the *exact* version string to avoid green-on-stale-cache
      # false positives when a previous version was already indexed.
      # A descriptive User-Agent is mandatory per the crates.io crawler
      # policy: the default `curl/*` UA is rejected with HTTP 403 from
      # GitHub Actions IP ranges (observed on v0.4.2).
      - name: Wait for crates.io index update
        shell: bash
        run: |
          target_version="${GITHUB_REF_NAME#v}"
          ua="perf-sentinel-release/${target_version} (+https://github.com/${GITHUB_REPOSITORY})"
          for i in $(seq 1 60); do
            if curl -fsS -A "${ua}" \
                 "https://crates.io/api/v1/crates/perf-sentinel-core/${target_version}" \
                 | grep -q "\"num\":\"${target_version}\""; then
              echo "::notice::perf-sentinel-core ${target_version} visible on crates.io"
              exit 0
            fi
            echo "Waiting for perf-sentinel-core ${target_version}... (attempt $i/60)"
            sleep 20
          done
          echo "::error::perf-sentinel-core ${target_version} did not appear on crates.io after 20 minutes"
          exit 1

      - name: Publish perf-sentinel
        shell: bash
        run: |
          set +e
          cargo publish -p perf-sentinel 2>&1 | tee /tmp/publish-cli.log
          status=${PIPESTATUS[0]}
          set -e
          if [ "$status" -eq 0 ]; then
            echo "::notice::perf-sentinel published"
            exit 0
          fi
          if grep -qE "already (uploaded|exists on crates\.io)" /tmp/publish-cli.log; then
            echo "::warning::perf-sentinel already on crates.io (idempotent re-run), skipping"
            exit 0
          fi
          echo "::error::perf-sentinel publish failed with a non-duplicate error; see log above"
          exit 1
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_IO_TOKEN }}

  docker:
    name: Docker image
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write # required to push the container image to GHCR
      security-events: write # required to upload Trivy SARIF to GitHub Code Scanning
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Download Linux amd64 binary
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: perf-sentinel-linux-amd64

      - name: Download Linux arm64 binary
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: perf-sentinel-linux-arm64

      - name: Prepare binaries
        run: |
          mkdir -p build/linux-amd64 build/linux-arm64
          cp perf-sentinel-linux-amd64 build/linux-amd64/perf-sentinel
          cp perf-sentinel-linux-arm64 build/linux-arm64/perf-sentinel
          chmod +x build/linux-amd64/perf-sentinel build/linux-arm64/perf-sentinel

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Set up QEMU
        uses: docker/setup-qemu-action@06116385d9baf250c9f4dcb4858b16962ea869c3 # v4.1.0

      - name: Extract version
        id: version
        run: echo "tag=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"

      # Scan the image before publishing so a vulnerable build cannot
      # reach GHCR or Docker Hub. Build a single-arch amd64 image and
      # load it into the local docker daemon (multi-arch loads are not
      # supported). CVEs found on amd64 apply to arm64 too since they
      # come from Rust crates linked statically, not from arch-specific
      # code. The real multi-arch push below rebuilds both platforms.
      # This block runs before the registry logins so registry tokens
      # are not materialized in the runner env during the scan.
      - name: Build image locally for scanning (amd64 only, no push)
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64
          load: true
          push: false
          tags: perf-sentinel:scan

      # ignore-unfixed drops CVEs without an upstream patch. Flagging
      # them would block releases on a timeline we do not control. Revisit
      # if a specific unfixed CVE ever justifies a custom mitigation.
      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: perf-sentinel:scan
          severity: HIGH,CRITICAL
          exit-code: '1'
          format: sarif
          output: trivy-results.sarif
          ignore-unfixed: true

      # Always upload so the SARIF lands in Code Scanning even when
      # Trivy fails the job, which makes the CVE detail reachable for
      # the fix loop instead of hiding inside the action logs.
      - name: Upload Trivy SARIF to Code Scanning
        if: always()
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          sarif_file: trivy-results.sarif
          category: trivy-image

      - name: Log in to GHCR
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push multi-arch image
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/robintra/perf-sentinel:${{ steps.version.outputs.tag }}
            ghcr.io/robintra/perf-sentinel:latest
            robintrassard/perf-sentinel:${{ steps.version.outputs.tag }}
            robintrassard/perf-sentinel:latest
