# Wire-conformance integration test for the Kepler, Redfish and
# Scaphandre scrapers.
#
# This workflow exists to catch upstream renames or schema changes BEFORE
# they ship a dead-on-arrival perf-sentinel release, the v0.7.4 trap. It
# is NOT the release gate (`docs/RELEASE-PROCEDURE.md` forbids invoking
# the lab gate from CI), and it is NOT a measure of energy precision.
# Each job runs against a real upstream backend in fake-meter / mockup /
# fake-powercap mode: the metric NAMES and LABELS come from real upstream
# code so parser conformance is asserted for real, but the watt and
# energy values are synthetic and have no physical meaning.
#
# Three independent jobs. No `needs:` chain, so an upstream rename in
# one source does not mask a regression in another.

name: Upstream wire conformance

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'crates/sentinel-core/src/score/kepler/**'
      - 'crates/sentinel-core/src/score/redfish/**'
      - 'crates/sentinel-core/src/score/scaphandre/**'
      - '.github/workflows/upstream-wire-conformance.yml'
  pull_request:
    paths:
      - 'crates/sentinel-core/src/score/kepler/**'
      - 'crates/sentinel-core/src/score/redfish/**'
      - 'crates/sentinel-core/src/score/scaphandre/**'
      - '.github/workflows/upstream-wire-conformance.yml'
  # Weekly cron catches upstream renames in the absence of any local
  # change. Monday 06:00 UTC keeps it off the busy weekday slots.
  schedule:
    - cron: '0 6 * * 1'

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUST_LOG: info

jobs:

  kepler-wire-conformance:
    name: kepler-wire-conformance
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        id: checkout-1
        continue-on-error: true
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Checkout (retry 2/3)
        id: checkout-2
        if: steps.checkout-1.outcome == 'failure'
        continue-on-error: true
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Checkout (retry 3/3)
        if: steps.checkout-2.outcome == 'failure'
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8  # stable

      - name: Cargo cache
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4  # v2.9.1
        with:
          shared-key: upstream-wire-conformance

      - name: Build perf-sentinel
        run: cargo build --release -p perf-sentinel

      - name: Create kind cluster
        # Container-mode Kepler metrics require Kubernetes pod
        # discovery; the kubelet podInformer needs node RBAC k3d/kind
        # cannot give us cleanly, so we fall back to apiserver mode in
        # the Kepler config below.
        uses: helm/kind-action@ef37e7f390d99f746eb8b610417061a60e82a6cc  # v1.14.0
        with:
          cluster_name: kepler-wire
          wait: 60s

      - name: Apply Kepler v0.11.4 DaemonSet
        run: |
          cat <<'EOF' | kubectl apply -f -
          apiVersion: v1
          kind: Namespace
          metadata:
            name: kepler
            labels:
              pod-security.kubernetes.io/enforce: privileged
          ---
          apiVersion: v1
          kind: ServiceAccount
          metadata:
            name: kepler
            namespace: kepler
          ---
          apiVersion: rbac.authorization.k8s.io/v1
          kind: ClusterRole
          metadata:
            name: kepler
          rules:
            - apiGroups: [""]
              resources: ["nodes", "pods"]
              verbs: ["get", "list", "watch"]
          ---
          apiVersion: rbac.authorization.k8s.io/v1
          kind: ClusterRoleBinding
          metadata:
            name: kepler
          roleRef:
            apiGroup: rbac.authorization.k8s.io
            kind: ClusterRole
            name: kepler
          subjects:
            - kind: ServiceAccount
              name: kepler
              namespace: kepler
          ---
          apiVersion: v1
          kind: ConfigMap
          metadata:
            name: kepler
            namespace: kepler
          data:
            # The actual fake-meter knob is `dev.fake-cpu-meter.enabled`,
            # not `cpu.meters: ["fake"]` (the latter appears in some
            # v0.11 release notes but is not in the parsed schema).
            # Kepler emits synthetic readings without RAPL but the
            # metric NAMES are the real ones.
            config.yaml: |
              log:
                level: info
                format: text
              monitor:
                interval: 5s
                staleness: 1000ms
                maxTerminated: 100
                minTerminatedEnergyThreshold: 10
              web:
                listenAddresses:
                  - ":28282"
              kube:
                podInformer:
                  mode: apiserver
                  pollInterval: 15s
              dev:
                fake-cpu-meter:
                  enabled: true
                  zones: []
          ---
          apiVersion: v1
          kind: Service
          metadata:
            name: kepler
            namespace: kepler
          spec:
            type: ClusterIP
            selector:
              app.kubernetes.io/name: kepler
            ports:
              - name: http
                port: 28282
                targetPort: 28282
                protocol: TCP
          ---
          apiVersion: apps/v1
          kind: DaemonSet
          metadata:
            name: kepler
            namespace: kepler
          spec:
            selector:
              matchLabels:
                app.kubernetes.io/name: kepler
            template:
              metadata:
                labels:
                  app.kubernetes.io/name: kepler
              spec:
                serviceAccountName: kepler
                hostPID: true
                tolerations:
                  - effect: NoSchedule
                    key: node-role.kubernetes.io/control-plane
                  - effect: NoSchedule
                    key: node-role.kubernetes.io/master
                containers:
                  - name: kepler
                    image: quay.io/sustainable_computing_io/kepler@sha256:45571f233951fb96c3a2900e1d5e4cbb4ade9cd36ed419dcd87661e067168fdf  # v0.11.4 amd64
                    imagePullPolicy: IfNotPresent
                    command: ["/usr/bin/kepler"]
                    args:
                      - --config.file=/etc/kepler/config.yaml
                      - --kube.enable
                      - --kube.node-name=$(NODE_NAME)
                    env:
                      - name: NODE_NAME
                        valueFrom:
                          fieldRef:
                            fieldPath: spec.nodeName
                    ports:
                      - name: http
                        containerPort: 28282
                        protocol: TCP
                    securityContext:
                      privileged: true
                    volumeMounts:
                      - { name: sysfs, mountPath: /host/sys, readOnly: true }
                      - { name: procfs, mountPath: /host/proc, readOnly: true }
                      - { name: config, mountPath: /etc/kepler, readOnly: true }
                volumes:
                  - { name: sysfs, hostPath: { path: /sys, type: Directory } }
                  - { name: procfs, hostPath: { path: /proc, type: Directory } }
                  - { name: config, configMap: { name: kepler } }
          EOF

      - name: Deploy a workload pod for Kepler to attribute
        # Without a Pod with a named container, kepler_container_* would
        # have no targets to label. The pod name is arbitrary, only the
        # container_name label has to exist on the wire.
        run: |
          kubectl create namespace workload
          kubectl -n workload run sample --image=alpine:3.20 --restart=Never \
            --command -- sh -c 'while true; do sleep 30; done'
          kubectl -n workload wait --for=condition=Ready pod/sample --timeout=120s

      - name: Wait for Kepler Ready
        run: kubectl -n kepler rollout status daemonset/kepler --timeout=240s

      - name: Port-forward Kepler service
        run: |
          kubectl -n kepler port-forward svc/kepler 28282:28282 > /tmp/kepler-pf.log 2>&1 &
          for i in $(seq 1 20); do
            if curl -fsS http://localhost:28282/metrics >/dev/null 2>&1; then
              echo "kepler /metrics reachable after ${i}s"
              break
            fi
            sleep 1
          done
          curl -fsS http://localhost:28282/metrics >/dev/null

      - name: Wire assertion - Kepler /metrics conforms to parser contract
        # The point of truth: assert the EXACT names and labels that
        # crates/sentinel-core/src/score/kepler/config.rs:35-49 expects.
        # If upstream renames a metric or a label, this step fails with
        # the offending line printed, before any parser-side test runs.
        run: |
          curl -fsS http://localhost:28282/metrics -o /tmp/kepler-metrics.txt
          echo "--- /metrics head (first 40 lines)"
          head -40 /tmp/kepler-metrics.txt
          echo "---"

          fail=0

          if grep -qE '^kepler_container_cpu_joules_total\{[^}]*container_name="' /tmp/kepler-metrics.txt; then
            n=$(grep -cE '^kepler_container_cpu_joules_total\{[^}]*container_name="' /tmp/kepler-metrics.txt)
            echo "::notice::kepler_container_cpu_joules_total present with container_name label (${n} samples)"
          else
            echo "::error::Expected metric kepler_container_cpu_joules_total with label container_name not found in Kepler /metrics. Parser contract violated."
            fail=1
          fi

          if grep -qE '^kepler_process_cpu_joules_total\{[^}]*comm="' /tmp/kepler-metrics.txt; then
            n=$(grep -cE '^kepler_process_cpu_joules_total\{[^}]*comm="' /tmp/kepler-metrics.txt)
            echo "::notice::kepler_process_cpu_joules_total present with comm label (${n} samples)"
          else
            echo "::error::Expected metric kepler_process_cpu_joules_total with label comm not found in Kepler /metrics. Parser contract violated."
            fail=1
          fi

          exit "${fail}"

      - name: End-to-end assertion - perf-sentinel scrapes Kepler cleanly
        # Run perf-sentinel against the live Kepler, give it 4 scrape
        # ticks, then check that the scraper started and the zero-sample
        # warn did NOT fire. Absence of the warn implies the parser
        # found matching samples (the empty-deltas invariant: no warn
        # AND no samples is unreachable since the threshold is 3 ticks).
        run: |
          # service_mappings keys are arbitrary perf-sentinel service
          # names; the values must match container_name labels Kepler
          # emits. The kind cluster has one workload pod whose
          # container is named `sample`, plus Kepler's own daemonset
          # container `kepler`. We map both to test pattern matching.
          cat > /tmp/perf-sentinel.toml <<'EOF'
          [daemon]
          listen_address = "127.0.0.1"
          listen_port_http = 14318
          listen_port_grpc = 14317
          api_enabled = true
          environment = "staging"

          [green.kepler]
          endpoint = "http://localhost:28282/metrics"
          scrape_interval_secs = 5
          metric_kind = "container"

          [green.kepler.service_mappings]
          "wire-conformance-sample" = "sample"
          "wire-conformance-kepler" = "kepler"
          EOF

          ./target/release/perf-sentinel watch --config /tmp/perf-sentinel.toml \
            > /tmp/perf-sentinel.log 2>&1 &
          PID=$!

          # 4 ticks at 5s + margin. The zero-sample warn fires at 3
          # ticks if samples never match, so 20s is enough to see it
          # OR to confirm its absence.
          sleep 22
          kill "${PID}" 2>/dev/null || true
          wait "${PID}" 2>/dev/null || true

          echo "--- perf-sentinel daemon log (tail)"
          tail -80 /tmp/perf-sentinel.log
          echo "---"

          fail=0

          if grep -qF "Kepler scraper started" /tmp/perf-sentinel.log; then
            echo "::notice::Kepler scraper started cleanly"
          else
            echo "::error::Kepler scraper did not start. End-to-end assertion failed."
            fail=1
          fi

          if grep -qF "no samples matched the configured metric" /tmp/perf-sentinel.log; then
            echo "::error::Zero-sample warn-once fired. The parser saw HTTP 200 but no samples matched the configured metric. This indicates an upstream rename even though the wire assertion above passed (cardinality limit, label cap, control-char check or other validation in config.rs). Check the daemon log."
            fail=1
          else
            echo "::notice::No zero-sample warn fired (parser found matching samples)"
          fi

          exit "${fail}"

      - name: Debug artefacts (on failure)
        if: failure()
        run: |
          echo "--- kubectl get pods -A"
          kubectl get pods -A || true
          echo "--- kepler logs"
          kubectl -n kepler logs daemonset/kepler --tail=200 || true
          echo "--- Kepler /metrics full"
          cat /tmp/kepler-metrics.txt 2>/dev/null || true

  redfish-wire-conformance:
    name: redfish-wire-conformance
    runs-on: ubuntu-latest
    timeout-minutes: 15
    services:
      redfish-mockup:
        image: dmtf/redfish-mockup-server@sha256:6dbfa26272dc506b74a45d7356e31dc65396f7a8faf2b6ef860ee4b428e38d1b  # v1.2.9
        ports:
          - 8000:8000
    steps:
      - name: Checkout
        id: checkout-1
        continue-on-error: true
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Checkout (retry 2/3)
        id: checkout-2
        if: steps.checkout-1.outcome == 'failure'
        continue-on-error: true
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Checkout (retry 3/3)
        if: steps.checkout-2.outcome == 'failure'
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8  # stable

      - name: Cargo cache
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4  # v2.9.1
        with:
          shared-key: upstream-wire-conformance

      - name: Build perf-sentinel
        run: cargo build --release -p perf-sentinel

      - name: Wait for Redfish mockup ready
        run: |
          for i in $(seq 1 30); do
            if curl -fsS http://localhost:8000/redfish/v1/ >/dev/null 2>&1; then
              echo "mockup reachable after ${i}s"
              break
            fi
            sleep 1
          done
          curl -fsS http://localhost:8000/redfish/v1/ >/dev/null

      - name: Discover available chassis
        id: chassis
        run: |
          curl -fsS http://localhost:8000/redfish/v1/Chassis -o /tmp/chassis.json
          jq . /tmp/chassis.json
          first_chassis=$(jq -r '.Members[0]."@odata.id"' /tmp/chassis.json)
          echo "first_chassis=${first_chassis}" >> "${GITHUB_OUTPUT}"
          echo "::notice::First chassis odata id: ${first_chassis}"

      - name: Wire assertion - legacy Power path conforms to parser contract
        # The point of truth: assert the JSON pointer the parser uses
        # for the `legacy_power` schema (canonical
        # `/PowerControl/0/PowerConsumedWatts`, defined in
        # crates/sentinel-core/src/score/redfish/config.rs) resolves to
        # a finite positive number on the upstream-canonical mockup. If
        # DMTF changes the legacy mockup schema (drops PowerControl
        # array at this index, renames PowerConsumedWatts), this step
        # fails. The `environment_metrics` schema is asserted in a
        # sibling step below.
        run: |
          chassis="${{ steps.chassis.outputs.first_chassis }}"
          curl -fsS "http://localhost:8000${chassis}/Power" -o /tmp/power.json
          echo "--- Power resource head"
          head -40 /tmp/power.json
          echo "---"

          # jq -e exits non-zero on null/false. The query reaches the
          # exact path the parser reads (parser.rs:23).
          if jq -e '.PowerControl[0].PowerConsumedWatts | numbers | select(. > 0)' /tmp/power.json >/dev/null; then
            value=$(jq -r '.PowerControl[0].PowerConsumedWatts' /tmp/power.json)
            echo "::notice::PowerControl[0].PowerConsumedWatts = ${value}, matches parser contract"
          else
            echo "::error::Default JSON pointer /PowerControl/0/PowerConsumedWatts does not resolve to a positive finite number on the DMTF mockup. Parser contract violated."
            jq . /tmp/power.json
            exit 1
          fi

      - name: Dead-on-arrival probe - PowerSubsystem presence (informational)
        # The /Power resource was deprecated by DMTF Release 2020.4 in
        # favour of PowerSubsystem + EnvironmentMetrics. The perf-sentinel
        # parser now supports the modern EnvironmentMetrics endpoint
        # (v0.7.6, see `environment_metrics` schema below). The
        # PowerSubsystem resource itself does NOT carry instantaneous
        # wattage per DMTF schema, it describes infrastructure
        # (CapacityWatts, PowerSupplies, Batteries), so this probe stays
        # informational: we track its presence on the mockup as a hint
        # that the BMC has migrated infrastructure surfaces, without
        # acting on it.
        continue-on-error: true
        run: |
          chassis="${{ steps.chassis.outputs.first_chassis }}"
          if curl -fsS "http://localhost:8000${chassis}/PowerSubsystem" -o /tmp/powersubsystem.json 2>/dev/null; then
            echo "::notice::Mockup serves /PowerSubsystem (infrastructure metadata). Wattage reading is consumed via /EnvironmentMetrics, see the wire assertion below."
            jq . /tmp/powersubsystem.json | head -30
          else
            echo "::notice::Mockup does not serve /PowerSubsystem yet. Infrastructure surface not migrated."
          fi

      - name: Wire assertion - /EnvironmentMetrics carries PowerWatts.Reading
        # The modern equivalent of the legacy
        # `PowerControl[0].PowerConsumedWatts` is `PowerWatts.Reading`
        # under /Chassis/{id}/EnvironmentMetrics (DMTF Release 2020.4+,
        # schema v1.0+). The perf-sentinel parser's `environment_metrics`
        # schema reads exactly that pointer. If upstream renames the
        # property or the navigation path, this step fails with the
        # offending body printed.
        run: |
          chassis="${{ steps.chassis.outputs.first_chassis }}"
          curl -fsS "http://localhost:8000${chassis}/EnvironmentMetrics" -o /tmp/environmentmetrics.json
          echo "--- EnvironmentMetrics head"
          jq . /tmp/environmentmetrics.json | head -40
          echo "---"

          if jq -e '.PowerWatts.Reading | numbers | select(. > 0)' /tmp/environmentmetrics.json >/dev/null; then
            value=$(jq -r '.PowerWatts.Reading' /tmp/environmentmetrics.json)
            echo "::notice::PowerWatts.Reading = ${value}, matches environment_metrics parser contract"
          else
            echo "::error::Modern JSON pointer /PowerWatts/Reading does not resolve to a positive finite number on the DMTF mockup. Parser contract for the environment_metrics schema violated."
            jq . /tmp/environmentmetrics.json
            exit 1
          fi

      - name: End-to-end assertion - perf-sentinel scrapes Redfish cleanly
        # The wire assertion above already proves the parser would
        # match. Here we confirm the daemon side actually wires the
        # scrape AND that both schemas (legacy_power + environment_metrics)
        # parse without error from a single config. Two chassis-ids on
        # the same mockup, one per schema, exercise the per-endpoint
        # schema dispatch added in v0.7.6.
        run: |
          chassis="${{ steps.chassis.outputs.first_chassis }}"
          cat > /tmp/perf-sentinel.toml <<EOF
          [daemon]
          listen_address = "127.0.0.1"
          listen_port_http = 14318
          listen_port_grpc = 14317
          api_enabled = true
          environment = "staging"

          [green.redfish]
          scrape_interval_secs = 15

          [green.redfish.endpoints."chassis-legacy"]
          url = "http://localhost:8000${chassis}/Power"
          schema = "legacy_power"

          [green.redfish.endpoints."chassis-modern"]
          url = "http://localhost:8000${chassis}/EnvironmentMetrics"
          schema = "environment_metrics"

          [green.redfish.service_mappings]
          "wire-conformance-svc-legacy" = "chassis-legacy"
          "wire-conformance-svc-modern" = "chassis-modern"
          EOF

          ./target/release/perf-sentinel watch --config /tmp/perf-sentinel.toml \
            > /tmp/perf-sentinel.log 2>&1 &
          PID=$!

          # 1 tick at 15s (min interval) + margin to see at least one
          # successful scrape.
          sleep 22
          kill "${PID}" 2>/dev/null || true
          wait "${PID}" 2>/dev/null || true

          echo "--- perf-sentinel daemon log (tail)"
          tail -80 /tmp/perf-sentinel.log
          echo "---"

          fail=0

          if grep -qF "Redfish scraper started" /tmp/perf-sentinel.log; then
            echo "::notice::Redfish scraper started cleanly"
          else
            echo "::error::Redfish scraper did not start. End-to-end assertion failed."
            fail=1
          fi

          if grep -qiE "redfish.*(error|panic|fatal)" /tmp/perf-sentinel.log; then
            echo "::error::Redfish scraper logged an error or panic during the test window."
            grep -iE "redfish.*(error|panic|fatal)" /tmp/perf-sentinel.log
            fail=1
          fi

          exit "${fail}"

      - name: Debug artefacts (on failure)
        if: failure()
        run: |
          echo "--- chassis index"
          cat /tmp/chassis.json 2>/dev/null || true
          echo "--- Power resource"
          cat /tmp/power.json 2>/dev/null || true
          echo "--- perf-sentinel log"
          tail -200 /tmp/perf-sentinel.log 2>/dev/null || true

  scaphandre-wire-conformance:
    name: scaphandre-wire-conformance
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      SCAPHANDRE_VERSION: v1.0.2
      SCAPHANDRE_DEB_SHA256: 5c15c38e1d2f9380248a265213b4e04ef3816920210023f2f289a7dd6b5bd244
      SCAPHANDRE_POWERCAP_PATH: /tmp/scaph-powercap
    steps:
      - name: Checkout
        id: checkout-1
        continue-on-error: true
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Checkout (retry 2/3)
        id: checkout-2
        if: steps.checkout-1.outcome == 'failure'
        continue-on-error: true
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Checkout (retry 3/3)
        if: steps.checkout-2.outcome == 'failure'
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8  # stable

      - name: Cargo cache
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4  # v2.9.1
        with:
          shared-key: upstream-wire-conformance

      - name: Build perf-sentinel
        run: cargo build --release -p perf-sentinel

      - name: Install Scaphandre from upstream .deb
        # Pinned by SHA256 since hubblo-org publishes no OCI image. The
        # .deb is the closest equivalent to a digest pin: if upstream
        # rebuilds and republishes the same tag with a different SHA,
        # this step fails with a clear message and the pin must be
        # refreshed deliberately. The 'deb12' variant is the latest
        # Debian flavour produced by upstream as of v1.0.2 (2025-02-11)
        # and runs on ubuntu-latest.
        run: |
          curl -fsSL -o /tmp/scaphandre.deb \
            "https://github.com/hubblo-org/scaphandre/releases/download/${SCAPHANDRE_VERSION}/scaphandre_${SCAPHANDRE_VERSION}-deb12_amd64.deb"
          echo "${SCAPHANDRE_DEB_SHA256}  /tmp/scaphandre.deb" | sha256sum --check
          sudo dpkg -i /tmp/scaphandre.deb
          scaphandre --version

      - name: Generate fake powercap tree
        # Scaphandre in `--vm` mode reads its powercap arborescence
        # from SCAPHANDRE_POWERCAP_PATH (upstream
        # src/sensors/powercap_rapl.rs:31-35) instead of
        # /sys/class/powercap, which is absent on GitHub shared
        # runners. We build the minimal tree the sensor expects: one
        # socket directory `intel-rapl:0/` and one domain subdirectory
        # `intel-rapl:0:0/`, each with `name` + `energy_uj`. This is a
        # workaround use of `--vm` (officially intended for
        # qemu-exporter consumers) but the read path is identical to
        # physical mode, so wire conformance assertions are
        # meaningful.
        run: |
          mkdir -p "${SCAPHANDRE_POWERCAP_PATH}/intel-rapl:0/intel-rapl:0:0"
          echo "package-0" > "${SCAPHANDRE_POWERCAP_PATH}/intel-rapl:0/name"
          echo "0"         > "${SCAPHANDRE_POWERCAP_PATH}/intel-rapl:0/energy_uj"
          echo "core"      > "${SCAPHANDRE_POWERCAP_PATH}/intel-rapl:0/intel-rapl:0:0/name"
          echo "0"         > "${SCAPHANDRE_POWERCAP_PATH}/intel-rapl:0/intel-rapl:0:0/energy_uj"
          ls -laR "${SCAPHANDRE_POWERCAP_PATH}"

      - name: Start fake-energy ticker in background
        # Scaphandre computes per-process power as energy_uj delta over
        # time delta. A constant counter yields zero watts and no
        # `scaph_process_power_consumption_microwatts` line is emitted,
        # which would invalidate the wire assertion. The ticker bumps
        # both counters monotonically every second so the sensor sees
        # non-zero deltas. Increments are arbitrary, no physical
        # meaning.
        run: |
          ( c1=0; c2=0
            while true; do
              c1=$((c1 + 100000))
              c2=$((c2 +  50000))
              echo "${c1}" > "${SCAPHANDRE_POWERCAP_PATH}/intel-rapl:0/energy_uj"
              echo "${c2}" > "${SCAPHANDRE_POWERCAP_PATH}/intel-rapl:0/intel-rapl:0:0/energy_uj"
              sleep 1
            done ) &
          echo $! > /tmp/scaph-ticker.pid

      - name: Start a target process for per-exe attribution
        # Scaphandre still reads /proc/PID/stat in --vm mode to
        # attribute power to processes. A long-running shell busy-loop
        # gives the parser at least one `exe="bash"` entry to emit. The
        # loop is a fixture, not a workload, not a performance signal.
        run: |
          ( while true; do :; done ) &
          echo $! > /tmp/scaph-target.pid

      - name: Install JDK 25 (Temurin) for cmdline matcher assertion
        # Two co-located JVMs share /usr/lib/jvm/.../bin/java in `exe`,
        # only `cmdline` discriminates them. The assertion below runs
        # perf-sentinel against the real Scaphandre with a cmdline-aware
        # process_map and verifies no ambiguity warning fires.
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654  # v5.2.0
        with:
          distribution: temurin
          java-version: '25'

      - name: Build and spawn 2 toy JVMs for cmdline matcher assertion
        run: |
          mkdir -p /tmp/jbuild
          for tag in a b; do
            cat > "/tmp/jbuild/Main_${tag}.java" <<EOF
          public class Main_${tag} {
              public static void main(String[] args) throws Exception {
                  while (true) { Thread.sleep(1000); }
              }
          }
          EOF
            javac -d /tmp/jbuild "/tmp/jbuild/Main_${tag}.java"
            cat > "/tmp/jbuild/svc-${tag}.mf" <<EOF
          Main-Class: Main_${tag}

          EOF
            (cd /tmp/jbuild && jar cfm "/tmp/svc-${tag}.jar" "svc-${tag}.mf" "Main_${tag}.class")
            java -jar "/tmp/svc-${tag}.jar" &
            echo $! > "/tmp/svc-${tag}.pid"
          done
          # Give the JVMs a moment to enter /proc before Scaphandre walks it.
          sleep 10

      - name: Start Scaphandre in VM mode with prometheus exporter
        # sudo is required for /proc/PID/stat read access across all
        # users, matching the standard Scaphandre operating mode. The
        # prometheus exporter binds explicitly to 127.0.0.1:8080,
        # overriding the upstream default (0.0.0.0) so the test
        # endpoint is not exposed on the runner's external interfaces.
        # Port 8080 matches the perf-sentinel scaphandre/config.rs
        # default endpoint.
        # The redirect lives inside `sh -c` so it is performed by the
        # privileged shell (SC2024-clean); the log file ends up owned
        # by root but world-readable in /tmp, fine for subsequent
        # inspection by the runner user.
        run: |
          sudo -E sh -c 'nohup scaphandre --vm -s powercap_rapl prometheus --address 127.0.0.1 --port 8080 > /tmp/scaphandre.log 2>&1 & echo $! > /tmp/scaph-daemon.pid'
          sleep 2

      - name: Wait for Scaphandre /metrics reachable
        run: |
          for i in $(seq 1 20); do
            if curl -fsS http://localhost:8080/metrics >/dev/null 2>&1; then
              echo "scaphandre /metrics reachable after ${i}s"
              break
            fi
            sleep 1
          done
          curl -fsS http://localhost:8080/metrics >/dev/null

      - name: Wire assertion - Scaphandre /metrics conforms to parser contract
        # The point of truth: assert the EXACT metric name and label
        # crates/sentinel-core/src/score/scaphandre/parser.rs:39,144
        # expects. If upstream Scaphandre renames the metric or the
        # `exe` label, this step fails with the offending lines printed
        # before any parser-side test runs.
        #
        # This validates wire conformance ONLY, NOT energy precision.
        # The energy_uj values are synthetic; only the metric names and
        # labels come from the real upstream binary.
        #
        # Scaphandre emits `scaph_process_power_consumption_microwatts`
        # ONLY when at least two energy samples are recorded, because
        # it is computed as a power delta over time (upstream
        # src/sensors/mod.rs:817-823, gated on
        # `get_records_diff_power_microwatts()` returning Some). Each
        # `/metrics` scrape refreshes the topology and records ONE
        # energy sample. We therefore do a warmup scrape, sleep long
        # enough for the ticker to bump the fake counter, then issue
        # the assertion scrape so a real delta is computable.
        run: |
          curl -fsS http://localhost:8080/metrics >/dev/null
          sleep 3
          curl -fsS http://localhost:8080/metrics -o /tmp/scaph-metrics.txt
          echo "--- scaphandre /metrics head (first 40 lines)"
          head -40 /tmp/scaph-metrics.txt
          echo "---"

          fail=0

          # The ticker bumps energy_uj at 1 Hz and the scrape window
          # is ~22s, so any value of n below 3 means either a transient
          # emission bug or a partial match, both of which are worth
          # failing on to avoid false positives on the conformance
          # signal.
          n=$(grep -cE '^scaph_process_power_consumption_microwatts\{[^}]*exe="' /tmp/scaph-metrics.txt || true)
          if [ "${n}" -ge 3 ]; then
            echo "::notice::scaph_process_power_consumption_microwatts present with exe label (${n} samples)"
          else
            echo "::error::Expected at least 3 samples of scaph_process_power_consumption_microwatts with label exe in Scaphandre /metrics, got ${n}. Parser contract violated or transient emission."
            fail=1
          fi

          exit "${fail}"

      - name: End-to-end assertion - perf-sentinel scrapes Scaphandre cleanly
        # Run perf-sentinel against the live Scaphandre, give it 4
        # scrape ticks, then check that the scraper started, no error
        # or panic was logged, and the cmdline-aware matcher (v0.7.6)
        # disambiguates the two co-located JVMs without firing the
        # ambiguity warning. The bash busy-loop is also mapped to
        # exercise the legacy single-runtime path side-by-side.
        #
        # Caveat: Scaphandre's scraper has no zero-sample warn-once
        # equivalent to Kepler (kepler/scraper.rs
        # track_zero_sample_streak). A silent upstream rename of the
        # metric or label would not be caught at runtime today, this
        # job is the only line of defence. Hardening tracked for
        # v0.7.6.
        run: |
          cat > /tmp/perf-sentinel.toml <<'EOF'
          [daemon]
          listen_address = "127.0.0.1"
          listen_port_http = 14318
          listen_port_grpc = 14317
          api_enabled = true
          environment = "staging"

          [green.scaphandre]
          endpoint = "http://localhost:8080/metrics"
          scrape_interval_secs = 5

          [green.scaphandre.process_map."wire-conformance-svc"]
          exe_contains = "bash"

          [green.scaphandre.process_map."svc-a"]
          exe_contains = "bin/java"
          cmdline_contains = "svc-a.jar"

          [green.scaphandre.process_map."svc-b"]
          exe_contains = "bin/java"
          cmdline_contains = "svc-b.jar"
          EOF

          ./target/release/perf-sentinel watch --config /tmp/perf-sentinel.toml \
            > /tmp/perf-sentinel.log 2>&1 &
          PID=$!

          # 4 ticks at 5s + margin.
          sleep 22
          kill "${PID}" 2>/dev/null || true
          wait "${PID}" 2>/dev/null || true

          echo "--- perf-sentinel daemon log (tail)"
          tail -120 /tmp/perf-sentinel.log
          echo "---"

          fail=0

          if grep -qF "Scaphandre scraper started" /tmp/perf-sentinel.log; then
            echo "::notice::Scaphandre scraper started cleanly"
          else
            echo "::error::Scaphandre scraper did not start. End-to-end assertion failed."
            fail=1
          fi

          if grep -qiE "scaphandre.*(error|panic|fatal)" /tmp/perf-sentinel.log; then
            echo "::error::Scaphandre scraper logged an error or panic during the test window."
            grep -iE "scaphandre.*(error|panic|fatal)" /tmp/perf-sentinel.log
            fail=1
          fi

          if grep -qF "process_map matcher is ambiguous" /tmp/perf-sentinel.log; then
            echo "::error::cmdline-aware matcher reported ambiguity with cmdline_contains set per service. The matcher logic in score/scaphandre/ops.rs is not disambiguating co-located JVMs correctly."
            grep -F "process_map matcher is ambiguous" /tmp/perf-sentinel.log
            fail=1
          else
            echo "::notice::No matcher ambiguity warning. cmdline_contains disambiguated svc-a and svc-b cleanly."
          fi

          # Zero-sample warn-once net: HTTP 200 + 3+ consecutive ticks
          # with no parsed ProcessPower entries trips a warn that would
          # only fire on a silent upstream rename (or a host without
          # RAPL passthrough). The 22 s window covers 4 ticks, so any
          # occurrence of the warn here means the parser stopped
          # extracting samples even though Scaphandre answered 200.
          if grep -qF "no samples matched the configured metric" /tmp/perf-sentinel.log; then
            echo "::error::Scaphandre scraper tripped the zero-sample warn. The parser saw HTTP 200 but extracted no ProcessPower entries across 3+ ticks. Likely an upstream rename of scaph_process_power_consumption_microwatts or the exe label, or a RAPL-less host."
            grep -F "no samples matched the configured metric" /tmp/perf-sentinel.log
            fail=1
          else
            echo "::notice::No zero-sample warn fired. Parser extracted ProcessPower entries cleanly."
          fi

          exit "${fail}"

      - name: Debug artefacts (on failure)
        if: failure()
        run: |
          echo "--- scaphandre log"
          tail -200 /tmp/scaphandre.log 2>/dev/null || true
          echo "--- scaphandre /metrics full"
          cat /tmp/scaph-metrics.txt 2>/dev/null || true
          echo "--- fake powercap tree"
          ls -laR "${SCAPHANDRE_POWERCAP_PATH}" 2>/dev/null || true
          echo "--- perf-sentinel log"
          tail -200 /tmp/perf-sentinel.log 2>/dev/null || true

      - name: Cleanup background processes and artefacts
        if: always()
        run: |
          for pidfile in /tmp/scaph-ticker.pid /tmp/scaph-target.pid /tmp/svc-a.pid /tmp/svc-b.pid; do
            if [ -f "${pidfile}" ]; then
              pid=$(cat "${pidfile}")
              kill "${pid}" 2>/dev/null || true
            fi
          done
          if [ -f /tmp/scaph-daemon.pid ]; then
            sudo kill "$(cat /tmp/scaph-daemon.pid)" 2>/dev/null || true
          fi
          # Belt-and-braces fallback: catch any straggler if the pid
          # file is missing or the kill above raced with the launcher.
          sudo pkill -f 'scaphandre --vm' 2>/dev/null || true
          pkill -f 'java -jar /tmp/svc-' 2>/dev/null || true
          # Hygiene: root-owned log + powercap tree need sudo to remove.
          sudo rm -rf /tmp/scaph-powercap /tmp/scaphandre.log /tmp/scaphandre.deb \
            /tmp/scaph-metrics.txt /tmp/scaph-ticker.pid /tmp/scaph-target.pid \
            /tmp/scaph-daemon.pid /tmp/perf-sentinel.toml /tmp/perf-sentinel.log \
            /tmp/svc-a.jar /tmp/svc-b.jar /tmp/svc-a.pid /tmp/svc-b.pid /tmp/jbuild 2>/dev/null || true
