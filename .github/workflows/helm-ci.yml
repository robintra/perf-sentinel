name: Helm CI

on:
  pull_request:
    paths:
      - 'charts/**'
      - 'examples/helm/**'
      - '.github/workflows/helm-ci.yml'
      - 'scripts/check-chart-version-bumped.sh'
      - 'scripts/check-chart-appversion-annotation.sh'
      - 'scripts/test/check-chart-version-bumped-test.sh'
  workflow_dispatch:
    inputs:
      ref:
        description: 'Git ref to validate. Defaults to the dispatch ref.'
        required: false
        type: string

# PRs get re-pushed often. Cancel in-progress runs on the same ref so
# the feedback signal stays fresh without stacking redundant jobs.
concurrency:
  group: helm-ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    name: Helm lint
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ inputs.ref || github.ref }}

      - uses: azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2 # v5.0.0

      - name: helm lint
        run: helm lint charts/perf-sentinel/

  template-matrix:
    name: Render and validate (${{ matrix.leg }})
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - leg: deployment
            args: "--set workload.kind=Deployment"
          - leg: daemonset
            args: "--set workload.kind=DaemonSet"
          - leg: statefulset
            args: "--set workload.kind=StatefulSet"
          - leg: flags-on
            args: "--set serviceMonitor.enabled=true --set networkPolicy.enabled=true --set prometheusRule.enabled=true --set prometheusRule.energyScrapers=true --set podDisruptionBudget.enabled=true"
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ inputs.ref || github.ref }}

      - uses: azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2 # v5.0.0

      # kubeconform is a Go binary, direct download from the upstream
      # release is more reliable than taiki-e/install-action which
      # falls back to cargo-install on x86_64 and exits 101 since
      # kubeconform is not a Rust crate.
      - name: Install kubeconform
        run: |
          curl -fsSL -o /tmp/kubeconform.tgz \
            https://github.com/yannh/kubeconform/releases/download/v0.7.0/kubeconform-linux-amd64.tar.gz
          tar -xzf /tmp/kubeconform.tgz -C /tmp kubeconform
          sudo install -m 0755 /tmp/kubeconform /usr/local/bin/kubeconform
          kubeconform -v

      - name: helm template | kubeconform
        run: |
          helm template test charts/perf-sentinel/ ${{ matrix.args }} \
            | kubeconform -strict -summary -ignore-missing-schemas

  # Ensures the chart-side example values file stays compatible with
  # the chart's schema. The OTel Collector values file is deliberately
  # skipped here: it targets the upstream opentelemetry-collector chart,
  # not this one, so templating our chart against it would fail on keys
  # our schema rejects.
  example-values:
    name: Render example values
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ inputs.ref || github.ref }}

      - uses: azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2 # v5.0.0

      - name: Install kubeconform
        run: |
          curl -fsSL -o /tmp/kubeconform.tgz \
            https://github.com/yannh/kubeconform/releases/download/v0.7.0/kubeconform-linux-amd64.tar.gz
          tar -xzf /tmp/kubeconform.tgz -C /tmp kubeconform
          sudo install -m 0755 /tmp/kubeconform /usr/local/bin/kubeconform
          kubeconform -v

      - name: helm template -f values-perf-sentinel.yaml | kubeconform
        run: |
          helm template test charts/perf-sentinel/ \
            -f examples/helm/values-perf-sentinel.yaml \
            | kubeconform -strict -summary -ignore-missing-schemas

  # Guards against chart edits that forget to bump Chart.yaml:version.
  # Skipped automatically when the PR does not touch the chart, or only
  # touches the chart CHANGELOG (the script handles both cases).
  version-bumped:
    name: Verify chart version bump
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ inputs.ref || github.ref }}
          fetch-depth: 0 # the script needs the base ref to diff

      - name: Assert Chart.yaml:version bumped when chart changes
        # Pass the base ref as arg 1 via a non-reserved var. GITHUB_BASE_REF is
        # a built-in (empty outside pull_request), so an env: override is
        # ignored at runtime and the script saw no base ref on workflow_dispatch.
        # arg 1 takes priority in the script and works on both event types.
        run: scripts/check-chart-version-bumped.sh "${BASE_REF}"
        env:
          BASE_REF: ${{ github.base_ref || github.event.repository.default_branch }}

  # Catches drift between Chart.yaml:appVersion and the image tag
  # inside the `artifacthub.io/images` annotation. Artifact Hub would
  # otherwise advertise a stale daemon image whenever a bump forgets
  # the annotation.
  appversion-annotation:
    name: Verify appVersion matches artifacthub.io/images tag
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ inputs.ref || github.ref }}

      - name: Assert appVersion matches annotation
        run: scripts/check-chart-appversion-annotation.sh

  # Regression net around the bump-guard script itself. Runs every PR
  # through helm-ci so an edit to the guard that breaks a scenario
  # fails the PR instead of landing silently.
  bump-guard-self-test:
    name: Bump-guard self-test
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ inputs.ref || github.ref }}

      - name: Run self-test harness
        run: scripts/test/check-chart-version-bumped-test.sh

  # Misconfiguration scan of the rendered manifests. helm lint and kubeconform
  # above cover style and schema, this covers Kubernetes security posture
  # (privilege, capabilities, securityContext, resources). Soft-fail for now so
  # it reports without blocking: the chart has only low, by-design findings today
  # (tag-pinned image, the ephemeral helm-test hook). Drop --soft-fail once those
  # are addressed or skip-listed to turn this into a hard gate.
  checkov:
    name: Checkov (rendered manifests)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ inputs.ref || github.ref }}

      - uses: azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2 # v5.0.0

      # Render with the optional security-relevant resources on (NetworkPolicy,
      # ServiceMonitor) so they are scanned too. Workload-kind variants
      # (DaemonSet, StatefulSet) share the same pod spec, so the default
      # Deployment render already covers their security context. checkov is
      # pinned for reproducibility and run via `pipx run` so it does not depend
      # on ~/.local/bin being on PATH. Bump the pin periodically for new policies.
      - name: helm template | checkov
        run: |
          helm template perf-sentinel charts/perf-sentinel/ \
            --namespace perf-sentinel \
            --set networkPolicy.enabled=true \
            --set serviceMonitor.enabled=true > rendered-manifests.yaml
          pipx run --spec checkov==3.2.530 checkov -f rendered-manifests.yaml \
            --framework kubernetes \
            --compact \
            --soft-fail

  # Live smoke test: spin up a kind cluster, `helm install --wait`, then
  # `helm test`. Every job above only renders and schema-checks, nothing
  # installs the chart against a real API server. This is the only leg
  # that catches an admission rejection, a pod that never goes ready, or a
  # rendered config the daemon refuses to parse. It also runs the
  # templates/tests/test-connection.yaml hook, which has no other home.
  install-test:
    name: Install on kind + helm test
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ inputs.ref || github.ref }}

      - uses: azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2 # v5.0.0

      # kind as a direct binary download, same rationale as kubeconform above.
      - name: Install kind
        run: |
          curl -fsSL -o /tmp/kind \
            https://kind.sigs.k8s.io/dl/v0.26.0/kind-linux-amd64
          sudo install -m 0755 /tmp/kind /usr/local/bin/kind
          kind version

      - name: Create cluster
        run: kind create cluster --wait 60s

      # Pin the smoke test to the :latest published image rather than the
      # chart's appVersion. On a release-bump PR the appVersion already
      # points at the new version whose image is only pushed at tag time,
      # so the default would ImagePullBackOff. :latest is the last released
      # daemon and is enough to exercise chart install and readiness.
      - name: helm install --wait
        run: |
          helm install perf-sentinel charts/perf-sentinel/ \
            --namespace perf-sentinel --create-namespace \
            --set image.tag=latest \
            --wait --timeout 180s

      # No --logs: the test pod has hook-delete-policy hook-succeeded, so it is
      # gone by the time --logs would fetch it, which fails the step on a
      # passing test. Failure logs are captured by the diagnostics step below.
      - name: helm test
        run: helm test perf-sentinel --namespace perf-sentinel

      # Surface why the install or test failed instead of a bare non-zero exit.
      - name: Diagnostics on failure
        if: failure()
        run: |
          kubectl -n perf-sentinel get pods -o wide || true
          kubectl -n perf-sentinel describe pods || true
          kubectl -n perf-sentinel logs -l app.kubernetes.io/name=perf-sentinel --tail=100 || true
