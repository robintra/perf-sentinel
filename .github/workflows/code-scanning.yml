name: Code Scanning (weekly drift)

# Weekly safety-net scan. On every push/PR, `ci.yml` already runs Clippy
# (gated with `-D warnings`) and uploads the SARIF report to GitHub Code
# Scanning. This workflow exists to catch drift introduced by toolchain
# updates between pushes, e.g. a new lint added in a stable release that
# flags existing code without any code change on our side.
#
# This workflow does NOT fail on warnings; `ci.yml` remains the authoritative
# quality gate. `workflow_dispatch` is kept for manual re-scans.

on:
  schedule:
    # Weekly scan on Monday 06:00 UTC to catch drift even without pushes.
    - cron: '0 6 * * 1'
  workflow_dispatch:

# Required to publish SARIF results to GitHub Code Scanning.
permissions:
  contents: read
  security-events: write

jobs:
  clippy:
    name: Clippy (SARIF upload)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          toolchain: stable
          components: clippy

      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1

      - name: Install clippy-sarif and sarif-fmt
        uses: taiki-e/install-action@07b4745e0c39a41822af610387492e3e53aa222b # v2.83.4
        with:
          tool: clippy-sarif,sarif-fmt

      - name: Run Clippy and convert to SARIF
        shell: bash
        run: |
          # Do not fail the step on Clippy warnings: this job's purpose is to
          # surface them in Code Scanning, not to gate merges. `ci.yml` remains
          # the authoritative quality gate with `-D warnings`.
          set +e
          cargo clippy --workspace --all-targets --message-format=json \
            | clippy-sarif \
            | tee clippy.sarif \
            | sarif-fmt
          echo "Clippy SARIF generated at clippy.sarif"

      - name: Upload SARIF to GitHub Code Scanning
        uses: github/codeql-action/upload-sarif@7188fc363630916deb702c7fdcf4e481b751f97a # v4.37.1
        with:
          sarif_file: clippy.sarif
          category: clippy
