name: Release-gate CI

on:
  pull_request:
    paths:
      - 'release-gate/**'
      - 'scripts/test/check-lab-validation-test.sh'
      - '.github/workflows/release-gate-ci.yml'
  workflow_dispatch:
    inputs:
      ref:
        description: 'Ref to test (branch, tag, or SHA)'
        required: false
        type: string

# PRs get re-pushed often. Cancel in-progress runs on the same ref so
# the feedback signal stays fresh without stacking redundant jobs.
concurrency:
  group: release-gate-ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  self-test:
    name: release-gate self-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ inputs.ref || github.ref }}
      - name: Run self-test harness
        run: scripts/test/check-lab-validation-test.sh
