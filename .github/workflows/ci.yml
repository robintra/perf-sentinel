name: CI

on:
  push:
    branches: [main]
    paths:
      - 'crates/**'
      - 'tests/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - '.github/workflows/**'
      - 'sonar-project.properties'
  pull_request:
    branches: [main]
    paths:
      - 'crates/**'
      - 'tests/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - '.github/workflows/**'
      - 'sonar-project.properties'
  # Manual trigger so CI can be rerun against an arbitrary ref (tag,
  # commit, branch). Useful for re-validating an old release after a
  # toolchain update or recovering an audit trace on a past tag.
  # The dispatch itself must run on a ref that contains this trigger
  # block (typically main); the optional `ref` input then drives which
  # source the checkout step actually builds.
  workflow_dispatch:
    inputs:
      ref:
        description: 'Git ref (tag/branch/SHA) to check out and build. Defaults to the dispatch ref.'
        required: false
        type: string

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  check:
    name: Check & Test
    runs-on: ubuntu-latest
    # Skip CI on PRs from forks to prevent malicious code execution in runners.
    # Fork PRs don't have access to secrets (pull_request event), but can still
    # abuse compute. Maintainer can trigger CI manually after reviewing the code
    # via workflow_dispatch (which is itself maintainer-only via repo permissions).
    if: >-
      github.event_name == 'push'
      || github.event_name == 'workflow_dispatch'
      || github.event.pull_request.head.repo.full_name == github.repository
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
          # On workflow_dispatch with an explicit `ref` input, build that
          # ref instead of the dispatch ref. Falls back to the default
          # checkout behavior (github.ref) for push and pull_request.
          ref: ${{ inputs.ref || github.ref }}

      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # stable
        with:
          toolchain: stable
          components: clippy, rustfmt

      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Clippy report for SonarCloud
        run: cargo clippy --workspace --all-targets --message-format=json > clippy-report.json || true

      - name: Build
        run: cargo build --workspace

      - name: Test
        run: cargo test --workspace

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@ad25acb6b9413207b3174a4202c12aa9133691c6 # cargo-llvm-cov

      - name: Generate code coverage
        run: cargo llvm-cov --all-features --workspace --lcov --output-path lcov.info

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      - name: Audit dependencies
        run: cargo audit

      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@299e4b793aaa83bf2aba7c9c14bedbb485688ec4 # v7.1
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
