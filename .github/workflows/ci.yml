name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
      - 'logo/**'
      - 'tapes/**'
      - 'LICENSE'
      - '.github/dependabot.yml'
  pull_request:
    branches: [main]
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
      - 'logo/**'
      - 'tapes/**'
      - 'LICENSE'
      - '.github/dependabot.yml'
  # Manual trigger so CI can be rerun against an arbitrary ref (tag,
  # commit, branch). Useful for re-validating an old release after a
  # toolchain update or recovering an audit trace on a past tag.
  # The dispatch itself must run on a ref that contains this trigger
  # block (typically main); the optional `ref` input then drives which
  # source the checkout step actually builds.
  workflow_dispatch:
    inputs:
      ref:
        description: 'Git ref (tag/branch/SHA) to check out and build. Defaults to the dispatch ref.'
        required: false
        type: string

# Default-deny the GITHUB_TOKEN at the top level. Each job re-grants the
# narrower scope it needs (the check job adds security-events: write).
permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  check:
    name: Check & Test
    runs-on: ubuntu-latest
    # Skip CI on PRs from forks to prevent malicious code execution in runners.
    # Fork PRs don't have access to secrets (pull_request event), but can still
    # abuse compute. Maintainer can trigger CI manually after reviewing the code
    # via workflow_dispatch (which is itself maintainer-only via repo permissions).
    if: >-
      github.event_name == 'push'
      || github.event_name == 'workflow_dispatch'
      || github.event.pull_request.head.repo.full_name == github.repository
    permissions:
      contents: read
      # Required to upload the Clippy SARIF report to GitHub Code Scanning.
      security-events: write
    env:
      # Exposed at the job level so downstream steps can gate on `env.SONAR_TOKEN != ''`.
      # Dependabot PRs do not receive repo secrets, so the scan step skips itself.
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          # On workflow_dispatch with an explicit `ref` input, build that
          # ref instead of the dispatch ref. Falls back to the default
          # checkout behavior (github.ref) for push and pull_request.
          ref: ${{ inputs.ref || github.ref }}

      # No `toolchain:` input so the action installs what `rust-toolchain.toml`
      # declares (passing one makes it ignore the file). RUSTFLAGS is already
      # set above, so `rustflags: ""` is inert here, kept for parity.
      - uses: actions-rust-lang/setup-rust-toolchain@166cdcfd11aee3cb47222f9ddb555ce30ddb9659 # v1.17.0
        with:
          components: clippy, rustfmt
          rustflags: ""
          # Both restore the pre-migration behavior: this action defaults
          # cache-on-failure to true and installs a problem matcher that would
          # double-report the lints already uploaded as SARIF below.
          cache-on-failure: false
          matcher: false

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      # Mirrors what `cargo publish -p perf-sentinel-core` does: builds
      # the crate with no features enabled. Catches refs from unconditional
      # code paths (e.g. `impl Config`) into feature-gated modules that
      # the full-feature Clippy run above happily resolves but a bare
      # crates.io publish rejects.
      - name: Check perf-sentinel-core with no features (crates.io parity)
        run: cargo check -p perf-sentinel-core --no-default-features --all-targets

      - name: Clippy report (JSON for SonarCloud and SARIF)
        run: cargo clippy --workspace --all-targets --message-format=json > clippy-report.json || true

      - name: Install clippy-sarif and sarif-fmt
        uses: taiki-e/install-action@07b4745e0c39a41822af610387492e3e53aa222b # v2.83.4
        with:
          tool: clippy-sarif,sarif-fmt

      - name: Convert Clippy JSON to SARIF
        shell: bash
        run: cat clippy-report.json | clippy-sarif | tee clippy.sarif | sarif-fmt

      - name: Upload SARIF to GitHub Code Scanning
        uses: github/codeql-action/upload-sarif@7188fc363630916deb702c7fdcf4e481b751f97a # v4.37.1
        with:
          sarif_file: clippy.sarif
          category: clippy

      - name: Build
        run: cargo build --workspace

      - name: Test
        run: cargo test --workspace

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@07b4745e0c39a41822af610387492e3e53aa222b # v2.83.4
        with:
          tool: cargo-llvm-cov

      - name: Generate code coverage
        run: cargo llvm-cov --all-features --workspace --lcov --output-path lcov.info

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      - name: Audit dependencies
        run: cargo audit

      - name: SonarCloud Scan
        if: env.SONAR_TOKEN != ''
        # The 40-hex value below is the action's git SHA pin (Dependabot-managed),
        # not a credential. The real secret, SONAR_TOKEN, comes from secrets. The
        # SAST "SonarQube Docs API key" hit is a false positive on the SHA pin.
        # Standalone suppression on the line above the match so the Dependabot
        # version comment stays clean and the marker survives the next bump.
        # nosemgrep: generic.secrets.security.detected-sonarqube-docs-api-key
        uses: SonarSource/sonarqube-scan-action@22918119ff8e1ca75a623e15c8296b6ea4fbe28f # v8.2.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Smoke-test the musl release target so glibc/musl regressions (new C-FFI
  # crate, ring toolchain break, missing musl-tools) surface on PRs instead
  # of at `git tag v*` time in release.yml. Mirrors the amd64 path of the
  # release workflow: ubuntu-latest runner, native musl toolchain, release
  # profile. Cross-compiled aarch64-musl (which goes through `cross` in
  # release.yml) is not duplicated here since `cross` pins its own Docker
  # toolchain and the amd64 smoke test catches dependency-level regressions.
  musl-smoke:
    name: Musl release build
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'push'
      || github.event_name == 'workflow_dispatch'
      || github.event.pull_request.head.repo.full_name == github.repository
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ inputs.ref || github.ref }}

      - uses: actions-rust-lang/setup-rust-toolchain@166cdcfd11aee3cb47222f9ddb555ce30ddb9659 # v1.17.0
        with:
          rustflags: ""
          cache-key: musl-smoke
          cache-on-failure: false

      - name: Install musl-tools
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      # The target must land on the toolchain `rust-toolchain.toml` pins
      # (1.97.1), otherwise the build fails with `error[E0463]: can't find
      # crate for core`. `rustup target add` applies to the active toolchain.
      - name: Add musl target to the pinned toolchain
        run: |
          cargo --version
          rustup target add x86_64-unknown-linux-musl

      - name: Build release binary (musl)
        run: cargo build --release --target x86_64-unknown-linux-musl -p perf-sentinel

      # Fail loudly if a future change accidentally reintroduces a dynamic
      # link against glibc. Rust's musl target produces a Position Independent
      # Executable that is fully statically linked, which modern `file` on
      # Ubuntu 24.04 reports as "static-pie linked"; older `file` (e.g. on
      # Debian bookworm) reports it as "statically linked". Both are fully
      # static. The negative we want to catch is "dynamically linked", which
      # would indicate a glibc dependency leaking back in.
      - name: Verify binary is statically linked
        run: |
          file target/x86_64-unknown-linux-musl/release/perf-sentinel
          file target/x86_64-unknown-linux-musl/release/perf-sentinel | grep -qE "statically linked|static-pie linked"
          ! file target/x86_64-unknown-linux-musl/release/perf-sentinel | grep -q "dynamically linked"

      # Run the musl binary to surface runtime init regressions (e.g. a
      # future dependency that segfaults on musl-only TLS layout).
      - name: Smoke-run the static binary
        run: ./target/x86_64-unknown-linux-musl/release/perf-sentinel --version

  # Playwright smoke suite for the HTML dashboard emitted by `perf-sentinel
  # report`. Runs in parallel with `check` so the Rust-only job is not
  # slowed by the Playwright / Chromium install (~90s). GitHub-hosted
  # runners only: `npx playwright install --with-deps chromium` uses
  # sudo apt-get to pull Chromium's system libraries, and the runner is
  # ephemeral here. On a self-hosted runner, prefer a pre-built
  # Playwright Docker image to keep the system package surface pinned.
  browser-tests:
    name: Browser tests
    runs-on: ubuntu-latest
    # Run inside the official Playwright image so chromium + the headless
    # shell + ffmpeg are pre-baked: no flaky CDN download (the previous
    # `playwright install` step regularly stalled after the 100% chromium
    # fetch). The tag MUST match @playwright/test in package-lock.json (1.59.1).
    container:
      image: mcr.microsoft.com/playwright:v1.59.1-noble
    timeout-minutes: 25
    if: >-
      github.event_name == 'push'
      || github.event_name == 'workflow_dispatch'
      || github.event.pull_request.head.repo.full_name == github.repository
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ inputs.ref || github.ref }}

      # The Playwright image ships node + browsers but not a C toolchain;
      # `cargo build` (ring's build.rs) needs cc and perl.
      - name: Install build toolchain
        run: apt-get update && apt-get install -y --no-install-recommends build-essential perl

      - uses: actions-rust-lang/setup-rust-toolchain@166cdcfd11aee3cb47222f9ddb555ce30ddb9659 # v1.17.0
        with:
          rustflags: ""
          cache-key: browser-tests
          cache-on-failure: false

      - name: Build release binary
        run: cargo build --release --bin perf-sentinel

      - name: Install browser test dependencies
        working-directory: crates/sentinel-cli/tests/browser
        run: npm ci

      # Browsers are pre-installed in the image (PLAYWRIGHT_BROWSERS_PATH=
      # /ms-playwright), so no `playwright install` download is needed.
      - name: Run Playwright suite
        working-directory: crates/sentinel-cli/tests/browser
        run: npx playwright test

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: playwright-report
          path: crates/sentinel-cli/tests/browser/playwright-report
          retention-days: 14

  # Secret scan on every push and PR. Runs in parallel with the other
  # jobs so a leak blocks merge without slowing the Rust build. Uses
  # the Gitleaks CLI directly instead of gitleaks/gitleaks-action so
  # every event scans the full git tree, not just the push/PR diff.
  # The bundled default ruleset (AWS keys, GitHub tokens, JWT, private
  # keys, etc.) is used; a project-level .gitleaks.toml is added only
  # if a documented false positive justifies it. The container is
  # pinned by digest to prevent tag-rewrite supply-chain drift.
  gitleaks:
    name: Secret scan
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'push'
      || github.event_name == 'workflow_dispatch'
      || github.event.pull_request.head.repo.full_name == github.repository
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          # Full history so the CLI re-audits every commit on each run.
          fetch-depth: 0
          ref: ${{ inputs.ref || github.ref }}

      - name: Run Gitleaks on full history
        run: |
          # Pinned by digest for supply-chain reproducibility. Retry the pull
          # so a transient Docker Hub timeout or rate-limit does not fail the
          # gate (the failure mode is exit 125, not a leak).
          IMAGE="zricethezav/gitleaks@sha256:c00b6bd0aeb3071cbcb79009cb16a60dd9e0a7c60e2be9ab65d25e6bc8abbb7f"
          for attempt in 1 2 3; do
            docker pull "$IMAGE" && break
            echo "gitleaks image pull attempt ${attempt} failed, retrying in $((attempt * 10))s..."
            sleep $((attempt * 10))
          done
          docker run --rm -v "${GITHUB_WORKSPACE}:/repo" \
            "$IMAGE" \
            detect --source=/repo --redact --no-banner --verbose
