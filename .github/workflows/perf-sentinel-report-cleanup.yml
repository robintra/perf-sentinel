# Dogfood report cleanup workflow for perf-sentinel itself.
#
# Removes `perf-sentinel-reports/pr-<N>/` from gh-pages when a PR
# closes. No-op until a companion per-PR report workflow exists.
#
# Consumer-facing equivalent at
# `docs/ci-templates/github-actions-report-cleanup.yml`.

name: perf-sentinel report cleanup (dogfood)

on:
  pull_request:
    types: [ closed ]

permissions:
  contents: write   # required to push to gh-pages

jobs:
  cleanup:
    name: Remove pr-<N>/ from gh-pages
    # Fork PRs never get per-PR reports published (the deploy step
    # needs `contents: write` which forks do not inherit), so there is
    # nothing to clean. Skipping the job avoids a no-op CI minute per
    # fork PR close.
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - name: Checkout gh-pages
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: gh-pages

      - name: Remove PR report directory
        run: |
          set -euo pipefail
          DIR="perf-sentinel-reports/pr-${{ github.event.pull_request.number }}"
          if [ -d "${DIR}" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git rm -rf "${DIR}"
            git commit -m "chore: remove perf-sentinel report for closed PR #${{ github.event.pull_request.number }}"
            # Retry once via rebase if a concurrent baseline or
            # PR-report push landed between our checkout and this push.
            git push || {
              git pull --rebase origin gh-pages
              git push
            }
          else
            echo "No report directory to clean for PR #${{ github.event.pull_request.number }}"
          fi
