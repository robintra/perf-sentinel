# perf-sentinel GitHub Actions workflow
#
# Runs perf-sentinel in batch mode against an integration-test trace fixture,
# uploads SARIF findings to GitHub Code Scanning, comments on PRs when
# findings change, and enforces a quality gate via a non-zero exit code on
# threshold breach.
#
# What you must adapt before using this template:
#   1. PERF_SENTINEL_VERSION: pin to an exact release tag (never use
#      'latest'). Bump deliberately and review the CHANGELOG before each bump.
#   2. PERF_SENTINEL_TRACES: path to a trace file produced by your integration
#      test stage. The trace file must be present in the workspace at the
#      moment perf-sentinel runs. Common patterns:
#        - emit traces from your test runner via OTel JSON exporter to
#          target/traces.json (Java/Maven, see ENTERPRISE-JAVA-INTEGRATION-FR.md
#          for a worked example).
#        - capture traces via tcpdump or sidecar collector during a docker
#          compose integration run.
#   3. PERF_SENTINEL_CONFIG: path to your .perf-sentinel.toml. Tune the
#      [thresholds] section to set quality-gate severity floors.
#   4. Action SHAs: every `uses:` below is pinned to a 40-character commit
#      SHA (with the human-readable version tag in a trailing comment).
#      Verify each SHA against the upstream repo before committing this
#      template to your project. Pinned SHAs protect against a force-pushed
#      tag pointing at malicious code, especially for third-party Actions
#      like marocchino/sticky-pull-request-comment. Bump SHAs deliberately
#      using a tool such as Dependabot configured with `update-types: ["sha"]`.
#
# See docs/CI.md (English) or docs/FR/CI-FR.md (French) for the full CI
# integration guide and the quality-gate philosophy.

name: perf-sentinel

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  security-events: write   # required for github/codeql-action/upload-sarif
  pull-requests: write     # required to comment on PRs

concurrency:
  # Shared with perf-sentinel-baseline.yml and
  # perf-sentinel-report-cleanup.yml so all three workflows that push
  # to gh-pages serialize through one lock. Prevents the 3-way race
  # where three PRs closed in the same minute overwrite each other on
  # push. cancel-in-progress: false so an in-flight publish runs to
  # completion.
  group: gh-pages-deploy
  cancel-in-progress: false

jobs:
  perf-sentinel:
    name: Performance anti-pattern scan
    runs-on: ubuntu-latest
    env:
      PERF_SENTINEL_VERSION: "0.7.0"
      PERF_SENTINEL_TRACES: "test-traces.json"
      PERF_SENTINEL_CONFIG: ".perf-sentinel.toml"

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      # Place your integration-test stage here. It must produce the trace file
      # at $PERF_SENTINEL_TRACES before perf-sentinel runs. Example:
      #
      # - name: Run integration tests with OTel tracing
      #   run: ./scripts/run-integration-tests.sh
      #   env:
      #     OTEL_TRACES_EXPORTER: otlp_file
      #     OTEL_EXPORTER_OTLP_FILE_PATH: ${{ env.PERF_SENTINEL_TRACES }}

      - name: Install perf-sentinel from GitHub Releases
        run: |
          set -euo pipefail
          BASE_URL="https://github.com/robintra/perf-sentinel/releases/download/v${PERF_SENTINEL_VERSION}"
          curl -sSLf -o perf-sentinel-linux-amd64 "${BASE_URL}/perf-sentinel-linux-amd64"
          curl -sSLf -o SHA256SUMS.txt            "${BASE_URL}/SHA256SUMS.txt"
          # Verify integrity before executing. Fails the build if the binary
          # was tampered with or the release is corrupted.
          grep 'perf-sentinel-linux-amd64' SHA256SUMS.txt | sha256sum -c -
          # Install under the workspace bin/ instead of /usr/local/bin so
          # the template works on hardened self-hosted runners that don't
          # grant passwordless sudo to the runner user. GITHUB_PATH lets
          # later steps invoke `perf-sentinel` directly.
          mkdir -p "${GITHUB_WORKSPACE}/bin"
          install -m 0755 perf-sentinel-linux-amd64 "${GITHUB_WORKSPACE}/bin/perf-sentinel"
          echo "${GITHUB_WORKSPACE}/bin" >> "${GITHUB_PATH}"
          "${GITHUB_WORKSPACE}/bin/perf-sentinel" --version

      # Interactive HTML report via GitHub Pages (opt-in). The four
      # blocks labelled "Download baseline from gh-pages", "Generate
      # interactive HTML report", "Checkout gh-pages worktree" and
      # "Publish report to gh-pages" below are commented by default
      # so this template stays functional without GitHub Pages.
      # Enable them once you have:
      #   1. created an empty `gh-pages` branch in this repo,
      #   2. enabled Pages in Settings -> Pages with source = gh-pages,
      #   3. added `perf-sentinel-baseline.yml` (see
      #      docs/ci-templates/github-actions-baseline.yml) so the
      #      Diff tab of the HTML report has a trunk baseline to
      #      compare against,
      #   4. added `perf-sentinel-report-cleanup.yml` (see
      #      docs/ci-templates/github-actions-report-cleanup.yml) so
      #      the gh-pages branch does not grow unbounded.
      # See docs/CI.md "Interactive report via GitHub Pages" for
      # the full recipe.
      #
      # - name: Download baseline from gh-pages
      #   # If the baseline does not exist yet (first run on a fresh
      #   # repo), curl returns 404 and the rest of the pipeline
      #   # proceeds without baseline. The HTML report still renders,
      #   # just without the Diff tab.
      #   run: |
      #     set +e
      #     BASELINE_URL="https://${GITHUB_REPOSITORY_OWNER}.github.io/${GITHUB_REPOSITORY##*/}/perf-sentinel-reports/baseline.json"
      #     curl -sSLf -o baseline.json "${BASELINE_URL}" || echo "baseline not available yet, skipping Diff tab"
      #     set -e

      - name: Run perf-sentinel analyze
        id: analyze
        # Continue on error so we can still upload SARIF and comment on PRs
        # even when the quality gate fails. The final step re-asserts the
        # exit code below.
        continue-on-error: true
        run: |
          set -euo pipefail
          perf-sentinel analyze \
            --ci \
            --input "${PERF_SENTINEL_TRACES}" \
            --config "${PERF_SENTINEL_CONFIG}" \
            --format sarif \
            > findings.sarif
          echo "exit_code=$?" >> "${GITHUB_OUTPUT}"

      - name: Upload SARIF to GitHub Code Scanning
        if: always() && hashFiles('findings.sarif') != ''
        uses: github/codeql-action/upload-sarif@95e58e9a2cdfd71adc6e0353d5c52f41a045d225 # v4.35.2
        with:
          sarif_file: findings.sarif
          category: perf-sentinel

      # - name: Generate interactive HTML report
      #   # Unlike SARIF which is static, the HTML is a full dashboard
      #   # (Findings, Explain, pg_stat, Diff, Correlations, GreenOps)
      #   # with deep-link hash routing, designed to be linked from the
      #   # PR comment for interactive review. The --before flag is
      #   # appended only when the baseline was fetched above.
      #   if: always() && hashFiles(env.PERF_SENTINEL_TRACES) != ''
      #   run: |
      #     set -euo pipefail
      #     args=(
      #       --input "${PERF_SENTINEL_TRACES}"
      #       --config "${PERF_SENTINEL_CONFIG}"
      #       --output report.html
      #     )
      #     if [ -f baseline.json ]; then
      #       args+=(--before baseline.json)
      #     fi
      #     perf-sentinel report "${args[@]}"
      #
      # - name: Checkout gh-pages worktree
      #   # The report is pushed to gh-pages via plain git rather than
      #   # a third-party deploy action, keeping the template free of
      #   # external dependencies beyond actions/checkout.
      #   if: github.event_name == 'pull_request' && hashFiles('report.html') != ''
      #   uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      #   with:
      #     ref: gh-pages
      #     path: gh-pages-worktree
      #
      # - name: Publish report to gh-pages
      #   # A companion cleanup workflow removes the pr-N/ directory
      #   # when the PR closes (see
      #   # docs/ci-templates/github-actions-report-cleanup.yml).
      #   if: github.event_name == 'pull_request' && hashFiles('report.html') != ''
      #   run: |
      #     set -euo pipefail
      #     DEST="gh-pages-worktree/perf-sentinel-reports/pr-${{ github.event.pull_request.number }}"
      #     mkdir -p "${DEST}"
      #     cp report.html "${DEST}/index.html"
      #     cd gh-pages-worktree
      #     git config user.name "github-actions[bot]"
      #     git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
      #     git add "perf-sentinel-reports/pr-${{ github.event.pull_request.number }}/"
      #     if git diff --cached --quiet; then
      #       echo "report unchanged, nothing to publish"
      #     else
      #       git commit -m "chore: publish perf-sentinel report for PR #${{ github.event.pull_request.number }}"
      #       # Retry once via rebase if a concurrent baseline or
      #       # cleanup push landed on gh-pages between our checkout
      #       # and this push.
      #       git push || {
      #         git pull --rebase origin gh-pages
      #         git push
      #       }
      #     fi

      - name: Generate PR comment summary
        if: github.event_name == 'pull_request' && hashFiles('findings.sarif') != ''
        run: |
          set -euo pipefail
          # Re-run analyze with JSON output to extract finding counts.
          perf-sentinel analyze \
            --input "${PERF_SENTINEL_TRACES}" \
            --config "${PERF_SENTINEL_CONFIG}" \
            --format json \
            > report.json || true
          {
            # Prepend the interactive report link when the HTML was
            # produced (i.e. the Pages blocks above are uncommented).
            # The baseline presence decides whether to land on #diff
            # (reviewer view, preferred) or #findings (first scan).
            if [ -f report.html ]; then
              PAGES_URL="https://${GITHUB_REPOSITORY_OWNER}.github.io/${GITHUB_REPOSITORY##*/}/perf-sentinel-reports/pr-${{ github.event.pull_request.number }}/"
              if [ -f baseline.json ]; then
                echo "📊 **[Interactive report (Diff view)](${PAGES_URL}#diff)**"
              else
                echo "📊 **[Interactive report](${PAGES_URL}#findings)**"
              fi
              echo ""
            fi
            echo "## perf-sentinel report"
            echo
            echo '```'
            jq -r '
              "Findings: \(.findings | length)",
              "  Critical: \([.findings[] | select(.severity == "critical")] | length)",
              "  Warning : \([.findings[] | select(.severity == "warning")]  | length)",
              "  Info    : \([.findings[] | select(.severity == "info")]     | length)",
              "",
              "I/O waste ratio: \(.green_summary.io_waste_ratio) (\(.green_summary.io_waste_ratio_band))",
              "Quality gate  : \(if .quality_gate.passed then "PASS" else "FAIL" end)"
            ' report.json
            echo '```'
          } > pr-comment.md

      - name: Post PR comment
        # Fork PRs receive a read-only GITHUB_TOKEN regardless of the
        # workflow's permissions: block, so
        # marocchino/sticky-pull-request-comment fails with "Resource
        # not accessible by integration". We tolerate that failure to
        # keep the build green, at the price of no sticky comment on
        # fork PRs. SARIF upload still runs, reviewers see findings in
        # the Checks UI. Projects that need the sticky comment on fork
        # PRs should migrate to the pull_request_target + workflow_run
        # split. See docs/CI.md "Fork PR limitations".
        if: github.event_name == 'pull_request' && hashFiles('pr-comment.md') != ''
        continue-on-error: true
        uses: marocchino/sticky-pull-request-comment@0ea0beb66eb9baf113663a64ec522f60e49231c0 # v3.0.4
        with:
          header: perf-sentinel
          path: pr-comment.md

      - name: Enforce quality gate (PR only)
        # Philosophy: the gate blocks on PRs so the developer still
        # has a chance to fix before merge, but never blocks a push
        # to trunk. The SARIF upload and PR comment above already
        # carry the signal. Exit 1 on trunk would only keep main
        # red, demotivate the team, and eventually push them to
        # disable the workflow.
        if: steps.analyze.outcome == 'failure' && github.event_name == 'pull_request'
        run: |
          echo "::error::perf-sentinel quality gate failed. See SARIF findings in the Security tab and the PR comment above."
          exit 1

      - name: Report quality gate outcome (trunk)
        # Surface the gate outcome on trunk as a warning, without
        # failing the run. The workflow stays green. The SARIF
        # upload still feeds Code Scanning for dashboarding and
        # trend analysis.
        if: steps.analyze.outcome == 'failure' && github.event_name == 'push'
        run: |
          echo "::warning::perf-sentinel quality gate would have failed on trunk. This is informational only and the workflow stays green. See SARIF findings in the Security tab."
